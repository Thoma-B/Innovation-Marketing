/* ---------- Tab bar ---------- */
let currentTab='map';
const TABS=[['map','🗺️','Aventure'],['free','🎯','Entraînement'],['review','🔁','Révision'],['stats','📈','Progrès'],['gloss','📖','Glossaire']];
function renderTabs(){
  const rev=toReviewList().length;
  $('#tabbar').innerHTML = TABS.map(([id,e,l])=>{
    const badge=(id==='review'&&rev>0)?'<span class="badge">'+(rev>99?'99+':rev)+'</span>':'';
    return '<div class="tabwrap"><button class="tab '+(currentTab===id?'active':'')+'" data-tab="'+id+'">'
      +'<span class="e">'+e+'</span>'+l+'</button>'+badge+'</div>';
  }).join('');
}
function showTabbar(on){ document.querySelector('.tabbar').style.display=on?'flex':'none'; }

/* ---------- Routing ---------- */
function go(tab){ currentTab=tab; renderTabs(); showTabbar(true);
  if(tab==='map') renderMap(); else if(tab==='free') renderFree();
  else if(tab==='review') renderReview(); else if(tab==='stats') renderStats();
  else if(tab==='gloss') renderGlossary();
  window.scrollTo({top:0,behavior:'instant'});
}

/* ---------- Carte (signature) ---------- */
function nodeState(idx){
  const node=NODES[idx];
  const rec=S.levels[node.id];
  if(rec && rec.completed) return 'done';
  if(idx<=S.unlockedIndex) return 'avail';
  return 'locked';
}
function starStr(n){ let s=''; for(let i=0;i<3;i++) s+= i<n?'⭐':'☆'; return s; }

  }
  html+='<div class="screentitle">Carte de l\'aventure</div>'
      +'<div class="screensub">4 zones · '+LEVELS.length+' niveaux · 1 boss final</div><div class="map"><div class="nodes">';

  let idx=0;
  MODULES.forEach(m=>{
    html+='<div class="zonebanner" style="border-color:'+m.col+';background:linear-gradient(90deg,'+m.col+'22,transparent);color:'+m.col+'">'
        +'<span class="dot" style="background:'+m.col+'"></span>'+esc(m.name)
        +'<small style="margin-left:auto;color:var(--ink-mute)">'+esc(m.sub)+'</small></div>';
    m.levels.forEach((l,i)=>{
      const st=nodeState(idx);
      const side = i%2===0 ? 'off-l' : 'off-r';
      const rec=S.levels[l.id]||{};
      const isCurrent = st==='avail' && idx===S.unlockedIndex && !rec.completed;
      const disc = st==='locked'
        ? '<div class="disc">🔒</div>'
        : '<div class="disc" style="background:linear-gradient(160deg,'+m.col+','+m.col+'cc);color:#11102a">'+l.icon+'</div>';
      const stars = (st==='done') ? '<div class="stars">'+starStr(rec.stars||0)+'</div>' : '';
      const pin = isCurrent ? '<div class="pin">'+mascot('').replace('<svg','<svg style="width:30px;height:30px"') +'</div>' : '';
      html+='<div class="noderow '+side+'">'
        +'<button class="node '+st+(isCurrent?' current':'')+'" data-node="'+idx+'" '+(st==='locked'?'aria-disabled="true"':'')+'>'
        +(idx>0?'<span class="connector"></span>':'')
        +pin+disc+stars
        +'<span class="cap">'+esc(l.name)+'</span></button></div>';
      idx++;
    });
  });
  // Boss
  const bst=nodeState(idx);
  html+='<button class="bossnode '+bst+'" data-node="'+idx+'">'
      +'<div class="disc">'+(bst==='locked'?'🔒':'👑')+'</div>'
      +'<span class="cap">Examen blanc</span>'
      +'<span class="sub">'+(bst==='locked'?('Termine les '+LEVELS.length+' niveaux'):(BOSS.draw+' questions mélangées · sans indice'))+'</span></button>';
  html+='</div></div>';
  view.innerHTML=html;

  const dw=$('#dismissW'); if(dw) dw.onclick=()=>{ S.onboarded=true; save(); renderMap(); };
  view.querySelectorAll('[data-node]').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.node, st=nodeState(i);
    if(st==='locked'){ shakeEl(b); sfxBad(); return; }
    startLevel(NODES[i], i===NODES.length-1?'boss':'adventure');
  });
}
function shakeEl(el){ el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake'); }

/* ---------- Entraînement libre ---------- */
function renderFree(){
  let html='<div class="screentitle">Entraînement libre</div><div class="screensub">Tous les niveaux ouverts — pas de blocage, ton XP compte quand même</div>';
  MODULES.forEach(m=>{
    html+='<div class="modgroup"><div class="modhead"><span class="dot" style="background:'+m.col+'"></span>'+esc(m.name)+'</div>';
    m.levels.forEach(l=>{
      const qs=l.q, mast=qs.filter(q=>isMastered(q.id)).length, pct=Math.round(mast/qs.length*100);
      html+='<button class="lvlcard" data-lvl="'+l.id+'">'
        +'<div class="ic" style="background:linear-gradient(160deg,'+m.col+','+m.col+'cc);color:#11102a">'+l.icon+'</div>'
        +'<div class="body"><div class="t">'+esc(l.name)+'</div>'
        +'<div class="m">'+qs.length+' questions <span class="mini-mast"><i style="width:'+pct+'%;background:'+m.col+'"></i></span> '+mast+'/'+qs.length+' maîtrisées</div></div>'
        +'<span class="chev">›</span></button>';
    });
    html+='</div>';
  });
  view.innerHTML=html;
  view.querySelectorAll('[data-lvl]').forEach(b=>b.onclick=()=>startLevel(levelById(b.dataset.lvl),'free'));
}

/* ---------- Révision des erreurs (cœur pédagogique) ---------- */
function renderReview(){
  const list=toReviewList();
  if(list.length===0){
    view.innerHTML='<div class="screentitle">Révision des erreurs</div>'
      +'<div class="empty">'+mascot('lg anim')+'<h3>Rien à revoir pour l\'instant</h3>'
      +'<p>Joue quelques niveaux d\'abord. Les questions que tu rates (ou que tu n\'as pas encore maîtrisées) apparaîtront ici pour que tu les retravailles.</p>'
      +'<button class="cta gold" data-goto="map" style="max-width:280px;margin:0 auto">Aller à l\'aventure</button></div>';
    view.querySelector('[data-goto]').onclick=()=>go('map'); return;
  }
  // répartition par module
  const byMod={}; list.forEach(q=>{ (byMod[q.modId]=byMod[q.modId]||[]).push(q); });
  let chips='';
  MODULES.forEach(m=>{ const c=(byMod[m.id]||[]).length; if(c) chips+='<span style="display:inline-flex;gap:6px;align-items:center;background:var(--surface);border:1px solid var(--line);padding:6px 11px;border-radius:99px;font-size:12px;font-weight:800;margin:0 6px 8px 0"><span style="width:9px;height:9px;border-radius:50%;background:'+m.col+'"></span>'+esc(m.name)+' · '+c+'</span>'; });
  view.innerHTML='<div class="screentitle">Révision des erreurs</div>'
    +'<div class="screensub">'+list.length+' question'+(list.length>1?'s':'')+' à retravailler. Une question est « maîtrisée » après 2 bonnes réponses.</div>'
    +'<div style="margin:6px 0 18px">'+chips+'</div>'
    +mascot('lg anim')
    +'<button class="cta green" id="startRev" style="margin-top:18px">Réviser maintenant ('+Math.min(list.length,15)+')</button>';
  $('#startRev').onclick=()=>{
    const sess=shuffle(list.slice()).slice(0,15);
    startSession(sess,'review',{name:'Révision',icon:'🔁',col:'var(--mint)'});
  };
}

/* ---------- Progrès / évolution ---------- */
function renderStats(){
  const p=levelProgress(S.xp);
  const acc = S.totalAnswered? Math.round(S.totalCorrect/S.totalAnswered*100):0;
  let starsGot=0,starsMax=NODES.length*3 - 3 + 3; starsMax=LEVELS.length*3+3;
  LEVELS.forEach(l=>{ starsGot+=(S.levels[l.id]||{}).stars||0; }); starsGot+=(S.levels.boss||{}).stars||0;
  const ringPct=Math.round(p.into/p.span*100);
  let html='<div class="screentitle">Tes progrès</div><div class="screensub">Ta vraie progression : ce que tu maîtrises, pas juste ce que tu as lu</div>';
  html+='<div class="bigstat">'
    +'<div class="ring"><svg viewBox="0 0 84 84" style="position:absolute;inset:0"><circle cx="42" cy="42" r="36" fill="none" stroke="#1b1440" stroke-width="8"/>'
    +'<circle cx="42" cy="42" r="36" fill="none" stroke="url(#g)" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+(2*Math.PI*36)+'" stroke-dashoffset="'+(2*Math.PI*36*(1-ringPct/100))+'" transform="rotate(-90 42 42)"/>'
    +'<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3DDC97"/><stop offset="1" stop-color="#46D0C8"/></linearGradient></defs></svg>'
    +'<div style="text-align:center"><div class="lv">'+p.n+'</div><div class="lvl">Niveau</div></div></div>'
    +'<div class="info"><div class="xpmeta"><span>Prochain niveau</span><span>'+p.into+' / '+p.span+' XP</span></div>'
    +'<div class="xpbar"><div class="xpfill" style="width:'+Math.max(4,ringPct)+'%"></div></div>'
    +'<div style="margin-top:8px;font-size:12px;color:var(--ink-mute);font-weight:800">XP total : '+S.xp+'</div></div></div>';
  html+='<div class="grid2">'
    +kpi(acc+'<small>%</small>','Précision')
    +kpi(S.totalAnswered,'Réponses')
    +kpi('🔥 '+S.longestStreak,'Meilleure série')
    +kpi('⭐ '+starsGot+'<small>/'+starsMax+'</small>','Étoiles')
    +'</div>';
  html+='<div class="sectlab">Maîtrise par module</div>';
  MODULES.forEach(m=>{ const mm=moduleMastery(m.id);
    html+='<div class="mastrow"><div class="nm">'+esc(m.name)+'<small>'+mm.mastered+' / '+mm.total+' questions</small></div>'
      +'<div class="bar"><i style="width:'+mm.pct+'%;background:'+m.col+'"></i></div>'
      +'<div class="pct" style="color:'+m.col+'">'+mm.pct+'%</div></div>';
  });
  if(!STORE) html+='<div class="notebox">ℹ️ Dans cet environnement, la progression n\'est pas sauvegardée d\'une session à l\'autre. Elle reste valable tant que tu gardes cette page ouverte.</div>';
  html+='<button class="dangerbtn" id="reset">Réinitialiser ma progression</button>';
  view.innerHTML=html;
  $('#reset').onclick=()=>{
    if(confirm('Effacer toute ta progression (XP, niveaux, étoiles, erreurs) ? Action définitive.')){
      S=defaultState(); save(); renderTop(); go('stats');
    }
  };
}
function kpi(v,l){ return '<div class="kpi"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>'; }

/* ---------- Glossaire ---------- */
let glossFilter='all', glossQuery='', glossFlash=false;
function norm(s){ return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function escA(s){ return esc(s).replace(/"/g,'&quot;'); }
function renderGlossary(){
  const total=GLOSSARY.length;
  const mods=[['all','Tous','var(--ink)'],['m1','Module 1','var(--z1)'],['m2','Module 2','var(--z2)'],['m3','Module 3','var(--z3)'],['m4','Module 4','var(--z4)']];
  let html='<div class="screentitle">Glossaire</div>'
    +'<div class="screensub">'+total+' définitions à connaître · cherche un terme, ou révise en flashcards</div>'
    +'<div class="gloss-tools">'
      +'<input id="gSearch" class="gloss-search" type="search" placeholder="🔎 Rechercher (terme ou définition)…" value="'+escA(glossQuery)+'" autocomplete="off" autocapitalize="off" spellcheck="false">'
      +'<button id="gFlash" class="gflash'+(glossFlash?' on':'')+'" aria-pressed="'+glossFlash+'">'+(glossFlash?'🃏 Flashcards : ON':'🃏 Mode flashcard')+'</button>'
    +'</div>'
    +'<div class="gloss-chips">'+mods.map(([id,lab,c])=>{
        const n = id==='all'?total:GLOSSARY.filter(g=>g.m===id).length;
        return '<button class="gchip'+(glossFilter===id?' on':'')+'" data-gf="'+id+'" style="--gc:'+c+'">'+esc(lab)+' <small>'+n+'</small></button>';
      }).join('')+'</div>';
  if(glossFlash) html+='<div class="gloss-hint">👆 Tape une carte pour révéler la définition — essaie de la restituer de mémoire d\'abord.</div>';
  html+='<div class="gloss-list" id="gList">';
  MODULES.forEach(m=>{
    if(glossFilter!=='all' && glossFilter!==m.id) return;
    const items=GLOSSARY.filter(g=>g.m===m.id);
    if(!items.length) return;
    html+='<div class="gloss-sec"><div class="gloss-secHead" style="color:'+m.col+'"><span class="dot" style="background:'+m.col+'"></span>'+esc(m.name)+' <small>'+items.length+'</small></div>';
    items.forEach(g=>{
      html+='<div class="gcard'+(glossFlash?' flash':'')+'" data-t="'+escA(norm(g.t+' '+g.d))+'" style="--gc:'+m.col+'">'
        +'<div class="gt">'+esc(g.t)+'</div>'
        +'<div class="gd">'+esc(g.d)+'</div>'
        +(glossFlash?'<span class="greveal">Révéler</span>':'')+'</div>';
    });
    html+='</div>';
  });
  html+='</div><div class="gloss-empty" id="gEmpty" style="display:none">Aucun terme ne correspond. Essaie un autre mot-clé.</div>';
  view.innerHTML=html;

  const search=$('#gSearch');
  search.oninput=()=>{ glossQuery=search.value; applyGlossSearch(); };
  $('#gFlash').onclick=()=>{ glossFlash=!glossFlash; renderGlossary(); };
  view.querySelectorAll('[data-gf]').forEach(b=>b.onclick=()=>{ glossFilter=b.dataset.gf; renderGlossary(); });
  if(glossFlash) view.querySelectorAll('.gcard.flash').forEach(c=>c.onclick=()=>c.classList.toggle('revealed'));
  applyGlossSearch();
  if(glossQuery){ search.focus(); try{ search.setSelectionRange(search.value.length,search.value.length); }catch(e){} }
}
function applyGlossSearch(){
  const q=norm(glossQuery.trim());
  let any=false;
  document.querySelectorAll('#gList .gcard').forEach(c=>{ const hit=!q||c.dataset.t.indexOf(q)>=0; c.style.display=hit?'':'none'; if(hit) any=true; });
  document.querySelectorAll('#gList .gloss-sec').forEach(sec=>{
    const vis=[...sec.querySelectorAll('.gcard')].some(c=>c.style.display!=='none');
    sec.style.display=vis?'':'none';
  });
  const empty=$('#gEmpty'); if(empty) empty.style.display=any?'none':'block';
}

/* ---------- Moteur de quiz ---------- */
let SES=null;
function startLevel(level, mode){
  const qs = (mode==='boss') ? shuffle(ALL_Q.slice()).slice(0,BOSS.draw) : shuffle(level.q.slice());
  startSession(qs, mode, level);
}
function startSession(questions, mode, level){
  SES={ questions, mode, level, i:0, mistakes:0, hearts:3, streak:0, correctCount:0,
        prepared: questions.map(prep) };
  showTabbar(false);
  renderQuestion();
  window.scrollTo({top:0,behavior:'instant'});
}
function prep(q){
  if(q.type==='vf') return {q,order:[0,1]};
  const order=[...q.opts.keys()]; shuffle(order); return {q,order};
}
function renderQuestion(){
  const {prepared,i,level,mode}=SES;
  const item=prepared[i], q=item.q;
  const col = mode==='boss'?'var(--boss)':(mode==='review'?'var(--mint)':modColVar(q.modId));
  const opts = (q.type==='vf')?['Vrai','Faux']:item.order.map(o=>q.opts[o]);
  const tag = q.type==='vf'?'Vrai ou Faux':'Choix unique';
  let h='<div class="quiz"><div class="qtop">'
    +'<button class="back" id="qBack" aria-label="Quitter">✕</button>'
    +'<div class="qprog"><i style="width:'+Math.round(i/SES.questions.length*100)+'%;background:linear-gradient(90deg,'+col+','+col+'aa)"></i></div>'
    +'<div class="hearts">'+[0,1,2].map(k=>'<span class="heart'+(k>=SES.hearts?' lost':'')+'">❤️</span>').join('')+'</div></div>';
  if(SES.streak>=2) h+='<div class="streakchip">🔥 Série de '+SES.streak+' !</div>';
  h+='<span class="qtag" style="background:'+col+'22;color:'+col+'">'+tag+'</span>';
  h+='<div class="qtext">'+esc(q.q)+'</div>';
  if(q.code) h+='<div class="qcode">'+esc(q.code)+'</div>';
  h+='<div class="opts" id="opts">';
  opts.forEach((t,p)=>{ h+='<button class="opt" data-p="'+p+'"><span class="key">'+(q.type==='vf'?(p===0?'V':'F'):String.fromCharCode(65+p))+'</span><span>'+esc(t)+'</span></button>'; });
  h+='</div><div id="qfoot"></div></div>';
  view.innerHTML=h;
  $('#qBack').onclick=quitSession;
  $('#opts').querySelectorAll('.opt').forEach(b=>b.onclick=()=>answer(+b.dataset.p));
}
function answer(p){
  const {prepared,i,mode}=SES; const item=prepared[i], q=item.q;
  const orig = (q.type==='vf')?p:item.order[p];
  const correct = orig===q.correct;
  const correctDisplay = (q.type==='vf')?q.correct:item.order.indexOf(q.correct);
  // verrouille
  const btns=$('#opts').querySelectorAll('.opt');
  btns.forEach(b=>b.disabled=true);
  btns[p].classList.add(correct?'good':'bad');
  if(!correct){ btns[correctDisplay].classList.add('good'); shakeEl(btns[p]); }
  // stats question
  const st=qStat(q.id); st.seen++; st.last=correct;
  if(correct){ st.correct++; if(st.correct>=2) st.mastered=true; }
  else { st.wrong++; st.mastered=false; }
  // session + global
  S.totalAnswered++; if(correct){ S.totalCorrect++; SES.correctCount++; SES.streak++; if(SES.streak>S.longestStreak) S.longestStreak=SES.streak; }
  else { SES.streak=0; SES.mistakes++; if(SES.hearts>0) SES.hearts--; }
  // XP
  let gain = correct ? 10 + Math.min(SES.streak-1,5)*2 : 0;
  if(correct) addXp(gain);
  if(correct){ sfxGood(); floatXp('+'+gain+' XP'); } else sfxBad();
  save();
  // explication + suite
  const foot=$('#qfoot');
  foot.innerHTML='<div class="explain '+(correct?'ok':'no')+'">'
    +'<div class="h">'+(correct?'✅ Bien vu !':'❌ Pas tout à fait')+'</div><p>'+esc(q.why)+'</p></div>'
    +'<button class="cta '+(correct?'green':'gold')+'" id="next">'+(SES.i>=SES.questions.length-1?'Voir le résultat':'Continuer')+' →</button>';
  $('#next').onclick=nextQuestion;
  foot.scrollIntoView({behavior:'smooth',block:'center'});
}
function floatXp(txt){ const d=document.createElement('div'); d.className='xppop'; d.textContent=txt; document.body.appendChild(d); setTimeout(()=>d.remove(),1000); }
function addXp(n){ const before=levelFromXp(S.xp); S.xp+=n; const after=levelFromXp(S.xp); if(SES) SES._xpThisRun=(SES._xpThisRun||0)+n; renderTop(); if(after>before && SES){ SES._leveledTo=after; } }
function nextQuestion(){
  SES.i++;
  if(SES.i>=SES.questions.length) return finishSession();
  renderQuestion(); window.scrollTo({top:0,behavior:'smooth'});
}
function quitSession(){ SES=null; go(currentTab==='map'?'map':currentTab); }

function finishSession(){
  const {mode,level,mistakes,questions}=SES;
  const stars = mistakes===0?3:(mistakes===1?2:1);
  const total=questions.length, right=SES.correctCount;
  // enregistrement (aventure/boss seulement → étoiles + déblocage)
  if(mode==='adventure'||mode==='boss'){
    const idx=NODES.findIndex(n=>n.id===level.id);
    const prev=S.levels[level.id]||{stars:0};
    S.levels[level.id]={completed:true, stars:Math.max(prev.stars||0, stars), attempts:(prev.attempts||0)+1};
    if(idx>=0 && idx+1>S.unlockedIndex && idx+1<=NODES.length-1) S.unlockedIndex=idx+1;
    if(idx>=0 && idx===NODES.length-1) {} // boss : rien de plus
    // bonus XP étoiles (première complétion ou amélioration)
    if(stars> (prev.stars||0)) addXp(stars*15);
  }
  save();
  showTabbar(false);
  const lvUp=SES._leveledTo;
  const col = mode==='boss'?'var(--boss)':(mode==='review'?'var(--mint)':(level&&level.col)|| modColVar((questions[0]||{}).modId));
  let head = mode==='review' ? 'Révision terminée' : (mode==='boss' ? (right>=total*0.7?'Examen réussi !':'Examen blanc terminé') : 'Niveau terminé !');
  let sub = right+' / '+total+' bonnes réponses';
  let html='<div class="result">'+mascot('lg anim')+'<h2 style="color:'+col+'">'+head+'</h2><p class="rsub">'+sub+'</p>';
  if(mode==='adventure'||mode==='boss'){
    html+='<div class="rstars">'+[0,1,2].map(k=>'<span class="s" data-k="'+k+'">⭐</span>').join('')+'</div>';
  }
  html+='<div class="rstats">'
    +'<div class="rstat"><div class="v" style="color:var(--mint)">'+Math.round(right/total*100)+'%</div><div class="l">Précision</div></div>'
    +'<div class="rstat"><div class="v" style="color:var(--gold)">+'+(SES._xpThisRun||0)+'</div><div class="l">XP gagnés</div></div>'
    +'</div>';
  if(lvUp) html+='<div style="font-family:var(--font-d);font-weight:700;color:var(--gold);font-size:18px;margin-bottom:10px">🎉 Niveau '+lvUp+' atteint !</div>';
  // boutons
  const idx=NODES.findIndex(n=>n.id===(level&&level.id));
  const hasNext=(mode==='adventure') && idx>=0 && idx+1<NODES.length && idx+1<=S.unlockedIndex;
  if(hasNext) html+='<button class="cta green" id="rNext">Niveau suivant →</button>';
  html+='<button class="cta '+(hasNext?'ghost':'gold')+'" id="rReplay">Rejouer</button>';
  html+='<button class="cta ghost" id="rMap">'+(mode==='review'?'Retour':'Retour à la carte')+'</button>';
  html+='</div>';
  view.innerHTML=html;

  // anim étoiles + son
  const got=stars;
  if(mode==='adventure'||mode==='boss'){
    view.querySelectorAll('.rstars .s').forEach((s,k)=>{ if(k<got) setTimeout(()=>{ s.classList.add('on'); sfxStar(k); },300+k*260); });
  }
  if(got>=3||lvUp){ confetti(40); if(lvUp) sfxLevelUp(); }
  else if(right>0) setTimeout(()=>{}, 0);

  const nx=$('#rNext'); if(nx) nx.onclick=()=>{ startLevel(NODES[idx+1],'adventure'); };
  $('#rReplay').onclick=()=>{ if(mode==='review'){ go('review'); } else startLevel(level, mode); };
  $('#rMap').onclick=()=>{ SES=null; go(mode==='review'?'review':'map'); };
  SES=null;
}


/* ---------- Boot ---------- */
function bindGlobal(){
  $('#muteBtn').onclick=()=>{ S.muted=!S.muted; renderTop(); save(); if(!S.muted) ensureAudio(); };
  $('#tabbar').addEventListener('click',e=>{ const t=e.target.closest('[data-tab]'); if(t) go(t.dataset.tab); });
  // audio au premier geste
  window.addEventListener('pointerdown',function once(){ ensureAudio(); window.removeEventListener('pointerdown',once); });
  // clavier dans le quiz
  document.addEventListener('keydown',e=>{
    if(!SES) return;
    const foot=$('#qfoot'); const next=$('#next');
    if((e.key==='Enter'||e.key===' ') && next){ e.preventDefault(); next.click(); return; }
    const opts=$('#opts'); if(opts){ const map={'1':0,'2':1,'3':2,'4':3,'a':0,'b':1,'c':2,'d':3,'v':0,'f':1}; const idx=map[e.key.toLowerCase()];
      if(idx!=null){ const b=opts.querySelectorAll('.opt')[idx]; if(b&&!b.disabled){ b.click(); } } }
  });
}

(async function(){
  await load();
  renderTop(); bindGlobal(); renderTabs(); go('map');
})();
</script>
