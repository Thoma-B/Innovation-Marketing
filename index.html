<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>CloudArchitect — Build &amp; Defend</title>
<style>
:root{
  --bg:#020617; --surface:#0f172a; --surface2:#1e293b; --border:#334155; --border2:#475569;
  --text:#f1f5f9; --muted:#94a3b8; --faint:#64748b; --faint2:#475569;
  --teal:#2dd4bf; --teal3:#5eead4; --teal5:#14b8a6;
  --amber:#fbbf24; --amber3:#fcd34d;
  --rose:#f43f5e; --rose3:#fda4af; --rose4:#fb7185;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; line-height:1.5;}
#app{max-width:760px; margin:0 auto; padding:24px 16px 64px;}
#app > * + *{margin-top:16px;}
.ico{width:1em; height:1em; flex:none; vertical-align:-0.125em;}
button{font-family:inherit; cursor:pointer; color:inherit;}
button:focus-visible,.level-row:focus-visible{outline:2px solid var(--teal); outline-offset:2px;}
.card{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px;}
.eyebrow{font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--teal3); display:inline-flex; align-items:center; gap:6px;}
.eyebrow.rose{color:var(--rose4); letter-spacing:.2em;}
.muted{color:var(--muted); font-size:14px; margin:6px 0 0;}
.mono{font-family:var(--mono);}
.faint{color:var(--faint);} .faint2{color:var(--faint2);} .teal{color:var(--teal);}
.h1{font-size:34px; font-weight:800; letter-spacing:-.02em; margin:6px 0 0; line-height:1.05;}
.h2{font-size:20px; font-weight:700; letter-spacing:-.01em; margin:4px 0 0;}
.btn{display:inline-flex; align-items:center; gap:8px; border-radius:10px; padding:10px 16px; font-size:14px; font-weight:600; border:1px solid transparent; transition:background .15s,color .15s,border-color .15s;}
.btn .ico{font-size:16px;}
.btn-primary{background:var(--teal5); color:#03201d;}
.btn-primary:hover{background:var(--teal);}
.btn-primary[disabled]{background:var(--surface2); color:var(--faint); cursor:not-allowed;}
.btn-ghost{background:transparent; border-color:var(--border2); color:var(--text);}
.btn-ghost:hover{background:var(--surface2);}
.iconbtn{display:inline-flex; padding:4px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:16px;}
.iconbtn:hover{background:var(--surface2);}
.linkbtn{margin-top:12px; background:none; border:none; padding:0; font-family:var(--mono); font-size:12px; color:var(--faint);}
.linkbtn:hover{color:var(--muted);}
.hero{padding:24px;}
.hero-sub{max-width:520px;}
.hero-stats{display:flex; align-items:center; gap:16px; margin-top:16px; flex-wrap:wrap;}
.stat{display:inline-flex; align-items:center; gap:8px; border:1px solid var(--border); background:var(--surface2); border-radius:10px; padding:8px 12px; font-size:14px;}
.amber-ico{color:var(--amber); font-size:16px;} .teal-ico{color:var(--teal);} .rose-ico{color:var(--rose4);} .heart-ico{color:var(--rose4); font-size:13px;}
.levels{display:flex; flex-direction:column; gap:12px;}
.level-row{display:flex; align-items:center; gap:16px; width:100%; text-align:left; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:16px; transition:border-color .15s;}
.level-row:hover{border-color:var(--teal5);}
.level-num{width:44px; height:44px; flex:none; display:flex; align-items:center; justify-content:center; border:1px solid var(--border2); background:var(--surface); border-radius:10px; font-size:18px; font-weight:700; color:var(--teal3);}
.level-mid{min-width:0; flex:1;}
.level-title{font-size:14px; font-weight:600; color:var(--text); margin:2px 0;}
.level-go{color:var(--faint); font-size:18px;}
.hq-tip{text-align:center; color:var(--faint2); font-size:12px;}
.stars{display:inline-flex; align-items:center; gap:2px; margin-top:2px;}
.star{font-size:14px;} .star-on{color:var(--amber);} .star-off{color:var(--border);}
.brief-top{display:flex; align-items:center; gap:8px; margin-bottom:4px;}
.hp-head{display:flex; align-items:center; justify-content:space-between; font-family:var(--mono); font-size:12px; margin-bottom:8px;}
.hp-head .lbl{color:var(--faint); display:inline-flex; align-items:center; gap:6px;}
.hpwrap{height:10px; background:var(--surface2); border-radius:999px; overflow:hidden;}
.hpfill{height:100%; border-radius:999px; transition:width .5s ease, background .3s;}
.hp-ok{background:var(--teal);} .hp-mid{background:var(--amber);} .hp-low{background:var(--rose);}
.hp-ok-text{color:var(--teal3);} .hp-mid-text{color:var(--amber3);} .hp-low-text{color:var(--rose3);}
.board{display:grid; grid-template-columns:1fr; gap:12px;}
@media(min-width:560px){ .board{grid-template-columns:1fr 1fr;} }
.bay{display:flex; flex-direction:column; background:var(--surface2); border:1px solid var(--border); border-radius:10px;}
.bay.held{border-color:var(--teal5);} .bay.breach{border-color:var(--rose);}
.bay-body{padding:12px;}
.bay-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;}
.bay-role{font-size:14px; font-weight:600; color:var(--text);}
.need{font-size:12px; color:var(--faint); margin:0 0 8px; line-height:1.45;}
.slot{display:flex; align-items:center; gap:8px; width:100%; text-align:left; border:1px dashed var(--border); background:var(--surface); border-radius:8px; padding:8px 10px; font-size:14px; color:var(--faint); transition:border-color .15s,color .15s;}
.slot .ico{font-size:16px;}
.slot.armed{border-color:var(--teal); color:var(--teal3);}
.slot.filled{border-style:solid; border-color:var(--border2); color:var(--text);}
.slot[disabled]{cursor:default;}
.slot-x{margin-left:auto; color:var(--faint); font-size:14px;}
.verdict{border-top:1px solid var(--border); padding:8px 12px;}
.bay.held .verdict{border-color:var(--teal5);} .bay.breach .verdict{border-color:var(--rose);}
.verdict-head{display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px; font-weight:700;}
.verdict.held .verdict-head{color:var(--teal3);} .verdict.breach .verdict-head{color:var(--rose3);}
.verdict-why{font-size:12px; color:var(--muted); margin:4px 0 0; line-height:1.5;}
.palette-label{font-size:11px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px;}
.cards-grid{display:grid; grid-template-columns:1fr; gap:8px;}
@media(min-width:560px){ .cards-grid{grid-template-columns:1fr 1fr 1fr;} }
.chip{display:flex; align-items:center; gap:8px; text-align:left; border:1px solid var(--border); background:var(--surface2); border-radius:8px; padding:8px 10px; color:var(--text); transition:background .15s,border-color .15s;}
.chip .ico{font-size:16px; flex:none;}
.chip:hover{background:var(--border);}
.chip.sel{background:var(--teal5); border-color:var(--teal); color:#03201d;}
.chip.used{background:var(--surface); border-color:var(--border); color:var(--faint2); cursor:default;}
.chip-txt{min-width:0; display:flex; flex-direction:column;}
.chip-label{font-size:13px; line-height:1.2;}
.chip-sub{font-size:11px; line-height:1.2; color:var(--faint);}
.chip.sel .chip-sub{color:#0a3d36;} .chip.used .chip-sub{color:var(--faint2);}
.deploy-row{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
.audit-line{display:flex; align-items:center; gap:8px; font-size:14px; color:var(--muted);}
.debrief{text-align:center; padding:20px;}
.debrief-stars{display:flex; justify-content:center; margin-bottom:4px;}
.debrief-stars .star{font-size:22px;}
.debrief-msg{max-width:440px; margin:8px auto 0;}
.debrief-actions{display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin-top:16px;}
</style>
</head>

function icon(name, cls){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ico '+(cls||'')+'">'+(ICONS[name]||'')+'</svg>'; }
function starsHTML(v){ let s=''; for(let i=0;i<3;i++){ const on=i<v; s+='<svg viewBox="0 0 24 24" fill="'+(on?'currentColor':'none')+'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ico star '+(on?'star-on':'star-off')+'">'+ICONS.star+'</svg>'; } return '<span class="stars">'+s+'</span>'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const state = { screen:'hq', levelIdx:0, placements:{}, selected:null, phase:'build', results:[], reveal:0, stars:{}, timer:null };
function curLevel(){ return LEVELS[state.levelIdx]; }

function saveStars(){ try{ localStorage.setItem('cloudarch_stars', JSON.stringify(state.stars)); }catch(e){} }

  h += '<div class="eyebrow rose">'+icon('swords')+' poste de commandement</div>';
  h += '<h1 class="h1">CLOUD<span class="teal">ARCHITECT</span></h1>';
  h += '<p class="muted hero-sub">'+`Monte l'infrastructure, puis encaisse les vagues d'attaques. Chaque menace bloquée est une décision d'architecture du cours. Décroche les 3 étoiles sur chaque mission.`+'</p>';
  h += '<div class="hero-stats"><div class="stat">'+icon('trophy','amber-ico')+'<span class="mono">'+esc(rank)+'</span></div>';
  h += '<div class="stat mono">'+starSvg+' '+total+'/'+maxStars+'</div></div></div>';
  h += '<div class="levels">';
  LEVELS.forEach((lv,i)=>{ const earned = state.stars[i]||0;
    h += '<button class="level-row" data-act="play" data-level="'+i+'">';
    h += '<div class="level-num mono">'+(i+1)+'</div>';
    h += '<div class="level-mid"><div class="eyebrow">'+esc(lv.theme)+'</div><div class="level-title">'+esc(lv.title)+'</div>'+starsHTML(earned)+'</div>';
    h += '<div class="level-go">'+(earned===0?icon('play','teal-ico'):icon('rotate'))+'</div></button>';
  });
  h += '</div>';
  h += '<p class="hq-tip mono">'+`Astuce : certaines cartes sont des pièges (clé en dur, bucket public…). À toi de les éviter.`+'</p>';
  return h;
}

function renderMission(){
  const lv = curLevel();
  const used = Object.values(state.placements);
  const allFilled = lv.bays.every(b=>state.placements[b.id]);
  const wrongRevealed = state.results.slice(0,state.reveal).filter(x=>!x).length;
  const uptime = Math.max(0, 100 - 20*wrongRevealed);
  const upcls = uptime>=80?'hp-ok':uptime>=40?'hp-mid':'hp-low';
  const wrongTotal = state.results.filter(x=>!x).length;
  const finalStars = wrongTotal===0?3:wrongTotal===1?2:wrongTotal===2?1:0;
  const showV = (i)=> state.phase==='debrief' || (state.phase==='audit' && i<state.reveal);

  let h = '<div class="card">';
  h += '<div class="brief-top"><button class="iconbtn" data-act="exit" aria-label="Retour">'+icon('chevronleft')+'</button>';
  h += '<span class="eyebrow">Mission '+(state.levelIdx+1)+' · '+esc(lv.theme)+'</span></div>';
  h += '<h2 class="h2">'+esc(lv.title)+'</h2><p class="muted">'+esc(lv.brief)+'</p></div>';

  if(state.phase!=='build'){
    h += '<div class="card"><div class="hp-head"><span class="lbl">'+icon('heart','heart-ico')+' UPTIME</span>';
    h += '<span class="'+upcls+'-text">'+uptime+'%</span></div>';
    h += '<div class="hpwrap"><div class="hpfill '+upcls+'" style="width:'+uptime+'%"></div></div>';
    if(state.phase==='audit'){ h += '<button class="linkbtn" data-act="skip">'+`passer l'animation »`+'</button>'; }
    h += '</div>';
  }

  h += '<div class="board">';
  lv.bays.forEach((bay,i)=>{
    const placed = state.placements[bay.id] ? CARDS[state.placements[bay.id]] : null;
    const v = showV(i); const held = state.results[i];
    h += '<div class="bay'+(v ? (held?' held':' breach') : '')+'"><div class="bay-body">';
    h += '<div class="bay-head"><span class="bay-role">'+esc(bay.role)+'</span><span class="mono faint2">baie '+(i+1)+'</span></div>';
    h += '<p class="need">'+esc(bay.need)+'</p>';
    const slotCls = placed ? 'filled' : (state.selected && state.phase==='build' ? 'armed' : 'empty');
    h += '<button class="slot '+slotCls+'" data-act="bay" data-bay="'+bay.id+'"'+(state.phase!=='build'?' disabled':'')+'>';
    if(placed){ h += icon(placed.icon)+'<span class="mono">'+esc(placed.label)+'</span>'+(state.phase==='build'?'<span class="slot-x">'+icon('x')+'</span>':''); }
    else { h += '<span class="mono">'+(state.selected&&state.phase==='build'?'placer ici →':'— vide —')+'</span>'; }
    h += '</button></div>';
    if(v){
      const tic = held ? 'check' : bay.threat.icon;
      h += '<div class="verdict '+(held?'held':'breach')+'"><div class="verdict-head">'+icon(tic)+'<span>'+esc(bay.threat.name)+' — '+(held?'tenu':'BRÈCHE')+'</span></div>';
      if(state.phase==='debrief'){
        const why = held ? bay.threat.held : bay.threat.breach + ' Ce qui l\u2019aurait tenue : ' + bay.threat.held;
        h += '<p class="verdict-why">'+esc(why)+'</p>';
      }
      h += '</div>';
    }
    h += '</div>';
  });
  h += '</div>';

  if(state.phase==='build'){
    h += '<div class="card"><div class="mono faint palette-label">Composants — choisis-en un, puis clique une baie</div><div class="cards-grid">';
    lv.palette.forEach(id=>{ const c=CARDS[id]; const u=used.indexOf(id)!==-1; const sel=state.selected===id;
      h += '<button class="chip'+(u?' used':'')+(sel?' sel':'')+'" data-act="pick" data-card="'+id+'"'+(u?' disabled':'')+'>'+icon(c.icon)+'<span class="chip-txt"><span class="chip-label mono">'+esc(c.label)+'</span><span class="chip-sub">'+esc(c.sub)+'</span></span></button>';
    });
    h += '</div></div>';
    h += '<div class="deploy-row"><button class="btn btn-primary" data-act="deploy"'+(allFilled?'':' disabled')+'>'+icon('rocket')+'<span>'+`Déployer et lancer l'audit`+'</span></button>';
    if(!allFilled){ h += '<span class="mono faint2">'+Object.keys(state.placements).length+'/'+lv.bays.length+' baies remplies</span>'; }
    h += '</div>';
  }

  if(state.phase==='audit'){ h += '<div class="audit-line mono">'+icon('swords','rose-ico')+' Audit en cours…</div>'; }

  if(state.phase==='debrief'){
    h += '<div class="card debrief"><div class="debrief-stars">'+starsHTML(finalStars)+'</div>';
    h += '<div class="mono '+upcls+'-text">Uptime final : '+uptime+'% · '+(wrongTotal===0?'aucune brèche':wrongTotal+' brèche'+(wrongTotal>1?'s':''))+'</div>';
    const msg = finalStars===3 ? `Architecture sans faille. Tu as su pourquoi chaque composant tient sa menace — exactement le réflexe attendu à l'exam.` : `Relis les brèches ci-dessus : chacune est une justification d'archi à connaître. Recommence pour viser le sans-faute.`;
    h += '<p class="muted debrief-msg">'+msg+'</p>';
    h += '<div class="debrief-actions"><button class="btn btn-ghost" data-act="reset">'+icon('rotate')+' Rejouer</button>';
    h += state.levelIdx<LEVELS.length-1
      ? '<button class="btn btn-primary" data-act="next"><span>Mission suivante</span>'+icon('chevronright')+'</button>'
      : '<button class="btn btn-primary" data-act="exit">'+icon('home')+' Retour au QG</button>';
    h += '</div></div>';
  }
  return h;
}

function render(){ document.getElementById('app').innerHTML = state.screen==='hq' ? renderHQ() : renderMission(); }

function startMission(i){ state.levelIdx=i; resetBuild(); state.screen='mission'; render(); }
function resetBuild(){ clearInterval(state.timer); state.placements={}; state.selected=null; state.results=[]; state.reveal=0; state.phase='build'; }
function pick(card){ if(Object.values(state.placements).indexOf(card)!==-1) return; state.selected = state.selected===card?null:card; render(); }
function onBay(bay){ if(state.phase!=='build') return; if(state.placements[bay]){ delete state.placements[bay]; render(); return; } if(state.selected){ state.placements[bay]=state.selected; state.selected=null; render(); } }
function deploy(){ const lv=curLevel(); state.results=lv.bays.map(b=>state.placements[b.id]===b.correct); state.reveal=0; state.phase='audit'; render(); startAudit(); }
function startAudit(){ clearInterval(state.timer); state.timer=setInterval(()=>{ const n=curLevel().bays.length; if(state.reveal<n){ state.reveal++; render(); } else { clearInterval(state.timer); setTimeout(()=>{ state.phase='debrief'; recordStars(); render(); },600); } },900); }
function skip(){ clearInterval(state.timer); state.reveal=curLevel().bays.length; render(); setTimeout(()=>{ state.phase='debrief'; recordStars(); render(); },300); }
function recordStars(){ const w=state.results.filter(x=>!x).length; const s=w===0?3:w===1?2:w===2?1:0; state.stars[state.levelIdx]=Math.max(state.stars[state.levelIdx]||0, s); saveStars(); }

function onClick(e){ const el=e.target.closest('[data-act]'); if(!el) return; const a=el.getAttribute('data-act');
  if(a==='play') startMission(parseInt(el.getAttribute('data-level'),10));
  else if(a==='exit'){ resetBuild(); state.screen='hq'; render(); }
  else if(a==='pick') pick(el.getAttribute('data-card'));
  else if(a==='bay') onBay(el.getAttribute('data-bay'));
  else if(a==='deploy') deploy();
  else if(a==='skip') skip();
  else if(a==='reset'){ resetBuild(); render(); }
  else if(a==='next'){ state.levelIdx=Math.min(LEVELS.length-1, state.levelIdx+1); resetBuild(); render(); }
}

loadStars();
document.addEventListener('click', onClick);
render();
</script>
</body>
</html>
