<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CyberQuête — Révisions ST2GID</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#160F2E; --bg-1:#1E1640; --bg-2:#281D52;
  --surface:#2C2358; --surface-2:#372C6E; --surface-3:#463A86;
  --line:#4A3E8C;
  --ink:#F5F2FF; --ink-soft:#CDC4F0; --ink-mute:#9A8ED0;
  --gold:#FFC93C; --gold-deep:#EDA826;
  --mint:#3DDC97; --mint-deep:#1FB97A;
  --coral:#FF7A7A; --coral-deep:#E84C4C;
  --cyan:#46D0C8; --violet:#AB8CFB; --sky:#56CCF2;
  --z1:#46D0C8; --z2:#AB8CFB; --z3:#FF7A7A; --z4:#FFC93C; --boss:#FF9E3D;
  --ring:#7CE0FF;
  --r:16px; --r-lg:24px; --r-xl:30px; --pill:999px;
  --font-d:'Fredoka', ui-rounded, 'Segoe UI', system-ui, sans-serif;
  --font-b:'Nunito', ui-rounded, system-ui, sans-serif;
  --font-m:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --sh:0 10px 30px rgba(0,0,0,.35);
  --sh-btn:0 5px 0 0 rgba(0,0,0,.28);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font-b); color:var(--ink);
  background:
    radial-gradient(1100px 700px at 18% -8%, #2A1F5E 0%, transparent 55%),
    radial-gradient(900px 600px at 110% 12%, #20264f 0%, transparent 50%),
    linear-gradient(165deg, var(--bg-0), var(--bg-1) 55%, var(--bg-2));
  min-height:100vh; min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.blob{position:fixed;border-radius:50%;filter:blur(60px);opacity:.32;z-index:0;pointer-events:none;animation:float 16s ease-in-out infinite}
.blob.b1{width:260px;height:260px;background:var(--violet);top:-60px;left:-70px}
.blob.b2{width:230px;height:230px;background:var(--cyan);bottom:8%;right:-80px;animation-delay:-5s}
.blob.b3{width:200px;height:200px;background:var(--gold);top:42%;left:-90px;animation-delay:-9s;opacity:.22}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(26px)}}

#app{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

/* ---- Top bar ---- */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;padding:12px 14px calc(10px);
  background:linear-gradient(180deg, rgba(22,15,46,.92), rgba(22,15,46,.55) 70%, transparent);
  backdrop-filter:blur(6px)}
.lvlbadge{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--pill);padding:6px 10px 6px 6px;box-shadow:var(--sh)}
.lvlbadge .num{font-family:var(--font-d);font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold-deep));
  color:#3a2a00;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.15)}
.lvlbadge .lab{font-size:11px;color:var(--ink-mute);font-weight:800;letter-spacing:.06em;text-transform:uppercase;line-height:1}
.xpwrap{flex:1;min-width:0}
.xpmeta{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-soft);font-weight:800;margin:0 2px 4px}
.xpbar{height:12px;background:#1b1440;border:1px solid var(--line);border-radius:var(--pill);overflow:hidden;position:relative}
.xpfill{height:100%;width:0;background:linear-gradient(90deg,var(--mint),var(--cyan));border-radius:var(--pill);transition:width .5s cubic-bezier(.2,.8,.2,1)}
.iconbtn{flex:none;width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--ink);
  font-size:17px;cursor:pointer;display:grid;place-items:center;box-shadow:var(--sh);transition:transform .12s}
.iconbtn:active{transform:scale(.92)}

/* ---- Views ---- */
.view{flex:1;padding:6px 16px 110px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.screentitle{font-family:var(--font-d);font-weight:700;font-size:24px;margin:8px 2px 2px}
.screensub{color:var(--ink-mute);font-weight:700;font-size:13px;margin:0 2px 16px}

/* ---- Welcome card ---- */
.welcome{background:linear-gradient(135deg,var(--surface-3),var(--surface));border:1px solid var(--line);
  border-radius:var(--r-lg);padding:16px;margin:6px 0 18px;display:flex;gap:14px;align-items:center;box-shadow:var(--sh);position:relative}
.welcome .x{position:absolute;top:8px;right:10px;color:var(--ink-mute);background:none;border:none;font-size:18px;cursor:pointer}
.welcome h3{font-family:var(--font-d);font-weight:700;margin:0 0 4px;font-size:17px}
.welcome p{margin:0;font-size:13px;color:var(--ink-soft);font-weight:600;line-height:1.45}

/* ---- Mascot ---- */
.mascot{flex:none}
.mascot.sm{width:54px;height:54px}
.mascot.lg{width:120px;height:120px}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}
.mascot.anim{animation:bob 3s ease-in-out infinite}

/* ---- Quest map ---- */
.map{position:relative;padding-top:6px}
.zonebanner{display:flex;align-items:center;gap:10px;margin:22px 0 6px;padding:9px 14px;border-radius:var(--pill);
  font-family:var(--font-d);font-weight:600;font-size:14px;border:1px solid;position:relative}
.zonebanner .dot{width:12px;height:12px;border-radius:50%}
.zonebanner small{font-weight:800;font-size:11px;opacity:.85;font-family:var(--font-b);text-transform:uppercase;letter-spacing:.05em}
.nodes{display:flex;flex-direction:column;align-items:center;position:relative}
.noderow{width:100%;display:flex;justify-content:center;padding:7px 0;position:relative}
.noderow.off-l{justify-content:flex-start;padding-left:16%}
.noderow.off-r{justify-content:flex-end;padding-right:16%}
.node{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;cursor:pointer;width:96px}
.node .disc{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;font-size:30px;position:relative;
  box-shadow:var(--sh-btn);transition:transform .14s}
.node:active .disc{transform:translateY(3px);box-shadow:0 2px 0 0 rgba(0,0,0,.28)}
.node .cap{font-size:11.5px;font-weight:800;color:var(--ink-soft);text-align:center;line-height:1.2;max-width:104px}
.node .stars{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);display:flex;gap:1px;font-size:13px;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.node.locked{cursor:not-allowed}
.node.locked .disc{background:#241c4d;border:2px dashed var(--line);color:var(--ink-mute);box-shadow:none}
.node.locked .cap{color:var(--ink-mute);opacity:.7}
.node.avail .disc{background:linear-gradient(160deg,var(--surface-3),var(--surface));border:2px solid var(--line)}
.node.done .disc{border:2px solid rgba(255,255,255,.5)}
.node.current::before{content:"";position:absolute;top:-9px;left:-9px;right:-9px;width:auto;height:92px;border-radius:50%;
  border:3px solid var(--ring);opacity:.0;animation:pulse 1.8s ease-out infinite}
@keyframes pulse{0%{transform:scale(.85);opacity:.7}100%{transform:scale(1.25);opacity:0}}
.node .pin{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:22px;animation:bob 2.2s ease-in-out infinite}
.connector{position:absolute;width:4px;background:repeating-linear-gradient(var(--line) 0 8px, transparent 8px 16px);
  left:50%;transform:translateX(-50%);top:0;bottom:0;z-index:-1}
.bossnode{margin:18px auto 4px;display:flex;flex-direction:column;align-items:center;gap:8px;background:none;border:none;cursor:pointer}
.bossnode .disc{width:104px;height:104px;border-radius:26px;display:grid;place-items:center;font-size:46px;
  background:linear-gradient(160deg,#ff9e3d,#ff5d5d);box-shadow:0 8px 0 0 rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.4);transition:transform .14s}
.bossnode:active .disc{transform:translateY(4px);box-shadow:0 4px 0 0 rgba(0,0,0,.3)}
.bossnode.locked .disc{background:#241c4d;border:2px dashed var(--line);box-shadow:none;color:var(--ink-mute);filter:grayscale(1)}
.bossnode .cap{font-family:var(--font-d);font-weight:700;font-size:16px}
.bossnode .sub{font-size:11px;color:var(--ink-soft);font-weight:800;margin-top:-4px}

/* ---- Practice / lists ---- */
.modgroup{margin-bottom:18px}
.modhead{display:flex;align-items:center;gap:9px;margin:4px 2px 10px;font-family:var(--font-d);font-weight:600;font-size:16px}
.modhead .dot{width:12px;height:12px;border-radius:50%}
.lvlcard{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);padding:12px;margin-bottom:9px;cursor:pointer;box-shadow:var(--sh);transition:transform .12s,border-color .12s}
.lvlcard:active{transform:scale(.985)}
.lvlcard .ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:22px;flex:none}
.lvlcard .body{flex:1;min-width:0}
.lvlcard .t{font-weight:800;font-size:14.5px}
.lvlcard .m{font-size:12px;color:var(--ink-mute);font-weight:700;margin-top:2px;display:flex;gap:8px;align-items:center}
.lvlcard .chev{color:var(--ink-mute);font-size:20px}
.mini-mast{height:6px;width:62px;background:#1b1440;border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.mini-mast i{display:block;height:100%;background:var(--mint)}

/* ---- Quiz ---- */
.quiz{padding:14px 16px 28px;animation:fade .3s ease}
.qtop{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.qtop .back{width:36px;height:36px;border-radius:11px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:18px;cursor:pointer;flex:none}
.qprog{flex:1;height:12px;background:#1b1440;border:1px solid var(--line);border-radius:99px;overflow:hidden}
.qprog i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--coral));transition:width .35s}
.hearts{display:flex;gap:2px;font-size:17px;flex:none}
.heart.lost{filter:grayscale(1);opacity:.35}
.streakchip{display:inline-flex;align-items:center;gap:4px;font-weight:900;font-size:12px;color:var(--gold);
  background:rgba(255,201,60,.12);border:1px solid rgba(255,201,60,.3);padding:3px 9px;border-radius:99px;margin-bottom:10px}
.qtag{display:inline-block;font-size:10.5px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 9px;border-radius:99px;margin-bottom:10px}
.qtext{font-family:var(--font-d);font-weight:500;font-size:20px;line-height:1.3;margin:2px 0 8px}
.qcode{font-family:var(--font-m);font-size:12.5px;background:#120c2c;border:1px solid var(--line);color:#9fe9c8;
  padding:10px 12px;border-radius:12px;margin:10px 0 4px;overflow-x:auto;white-space:pre-wrap;word-break:break-word}
.opts{display:flex;flex-direction:column;gap:11px;margin-top:14px}
.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--surface);border:2px solid var(--line);
  border-radius:var(--r);padding:14px;font-size:14.5px;font-weight:700;color:var(--ink);cursor:pointer;
  box-shadow:0 4px 0 0 rgba(0,0,0,.22);transition:transform .1s,border-color .12s,background .12s}
.opt:not(:disabled):active{transform:translateY(3px);box-shadow:0 1px 0 0 rgba(0,0,0,.22)}
.opt .key{width:26px;height:26px;border-radius:8px;background:#1b1440;border:1px solid var(--line);display:grid;place-items:center;
  font-family:var(--font-d);font-weight:700;font-size:13px;flex:none;color:var(--ink-soft)}
.opt.good{background:rgba(61,220,151,.16);border-color:var(--mint);box-shadow:0 4px 0 0 var(--mint-deep)}
.opt.good .key{background:var(--mint);color:#053a26;border-color:var(--mint)}
.opt.bad{background:rgba(255,122,122,.14);border-color:var(--coral);box-shadow:0 4px 0 0 var(--coral-deep)}
.opt.bad .key{background:var(--coral);color:#4a0e0e;border-color:var(--coral)}
.opt:disabled{cursor:default}
.shake{animation:shk .4s}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}

/* ---- Explain / footer ---- */
.explain{margin-top:16px;border-radius:var(--r-lg);padding:16px;border:1px solid;animation:slideup .3s ease}
@keyframes slideup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.explain.ok{background:rgba(61,220,151,.12);border-color:rgba(61,220,151,.4)}
.explain.no{background:rgba(255,122,122,.1);border-color:rgba(255,122,122,.4)}
.explain .h{font-family:var(--font-d);font-weight:700;font-size:17px;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.explain p{margin:0;font-size:13.5px;line-height:1.5;color:var(--ink-soft);font-weight:600}
.cta{display:block;width:100%;margin-top:16px;border:none;border-radius:var(--r);padding:16px;font-family:var(--font-d);
  font-weight:600;font-size:17px;cursor:pointer;box-shadow:0 5px 0 0 rgba(0,0,0,.3);transition:transform .1s}
.cta:active{transform:translateY(4px);box-shadow:0 1px 0 0 rgba(0,0,0,.3)}
.cta.green{background:linear-gradient(180deg,var(--mint),var(--mint-deep));color:#053a26}
.cta.gold{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#3a2a00}
.cta.ghost{background:var(--surface);color:var(--ink);box-shadow:0 5px 0 0 rgba(0,0,0,.25);border:1px solid var(--line)}
.xppop{position:fixed;left:50%;top:40%;transform:translateX(-50%);font-family:var(--font-d);font-weight:700;font-size:30px;
  color:var(--gold);text-shadow:0 2px 8px rgba(0,0,0,.5);pointer-events:none;z-index:60;animation:xpf 1s ease forwards}
@keyframes xpf{0%{opacity:0;transform:translate(-50%,10px) scale(.8)}25%{opacity:1;transform:translate(-50%,-10px) scale(1.1)}100%{opacity:0;transform:translate(-50%,-70px) scale(1)}}

/* ---- Result ---- */
.result{padding:28px 18px;text-align:center;animation:fade .4s ease;min-height:70vh;display:flex;flex-direction:column;justify-content:center}
.result h2{font-family:var(--font-d);font-weight:700;font-size:30px;margin:8px 0 4px}
.result .rsub{color:var(--ink-soft);font-weight:700;margin:0 0 20px;font-size:14px}
.rstars{display:flex;justify-content:center;gap:10px;margin:6px 0 18px}
.rstars .s{font-size:48px;opacity:.25;transform:scale(.7);transition:all .4s}
.rstars .s.on{opacity:1;transform:scale(1);filter:drop-shadow(0 4px 10px rgba(255,201,60,.5))}
.rstats{display:flex;gap:10px;justify-content:center;margin:4px 0 22px;flex-wrap:wrap}
.rstat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:12px 16px;min-width:96px}
.rstat .v{font-family:var(--font-d);font-weight:700;font-size:24px}
.rstat .l{font-size:11px;color:var(--ink-mute);font-weight:800;text-transform:uppercase;letter-spacing:.05em}

/* ---- Stats screen ---- */
.bigstat{background:linear-gradient(135deg,var(--surface-3),var(--surface));border:1px solid var(--line);border-radius:var(--r-lg);
  padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:16px;box-shadow:var(--sh)}
.bigstat .ring{width:84px;height:84px;flex:none;position:relative;display:grid;place-items:center}
.bigstat .ring .lv{font-family:var(--font-d);font-weight:700;font-size:30px;line-height:1}
.bigstat .ring .lvl{font-size:10px;font-weight:900;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.08em}
.bigstat .info{flex:1}
.bigstat .info .xpmeta{margin-bottom:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px}
.kpi .v{font-family:var(--font-d);font-weight:700;font-size:26px}
.kpi .l{font-size:11.5px;color:var(--ink-mute);font-weight:800;margin-top:2px}
.kpi .v small{font-size:14px;color:var(--ink-mute)}
.sectlab{font-family:var(--font-d);font-weight:600;font-size:15px;margin:18px 2px 10px}
.mastrow{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.mastrow .nm{flex:1;font-size:13px;font-weight:800}
.mastrow .nm small{display:block;color:var(--ink-mute);font-weight:700;font-size:11px}
.mastrow .bar{flex:1.4;height:14px;background:#1b1440;border:1px solid var(--line);border-radius:99px;overflow:hidden}
.mastrow .bar i{display:block;height:100%;border-radius:99px;transition:width .6s}
.mastrow .pct{width:42px;text-align:right;font-weight:900;font-size:13px;font-variant-numeric:tabular-nums}
.notebox{font-size:12px;color:var(--ink-mute);font-weight:700;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);padding:12px;margin:14px 0;line-height:1.45}
.dangerbtn{width:100%;margin-top:8px;background:none;border:1px solid var(--coral);color:var(--coral);border-radius:var(--r);
  padding:13px;font-weight:800;font-size:13px;cursor:pointer}

/* ---- Empty state ---- */
.empty{text-align:center;padding:34px 18px;color:var(--ink-soft)}
.empty .big{font-size:54px;margin-bottom:8px}
.empty h3{font-family:var(--font-d);font-weight:700;margin:0 0 6px;font-size:19px}
.empty p{font-size:13.5px;font-weight:600;color:var(--ink-mute);line-height:1.5;max-width:300px;margin:0 auto 16px}

/* ---- Tab bar ---- */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:center;
  pointer-events:none;padding:0 0 max(8px,env(safe-area-inset-bottom))}
.tabinner{pointer-events:auto;display:flex;gap:4px;background:rgba(28,21,64,.92);backdrop-filter:blur(10px);
  border:1px solid var(--line);border-radius:22px;padding:7px;box-shadow:0 -6px 26px rgba(0,0,0,.4);max-width:460px;width:calc(100% - 24px)}
.tab{flex:1;background:none;border:none;color:var(--ink-mute);cursor:pointer;border-radius:16px;padding:8px 4px;
  display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:800;font-size:10.5px;transition:color .15s,background .15s}
.tab .e{font-size:21px;line-height:1}
.tab.active{color:var(--ink);background:var(--surface-3)}
.tab .badge{position:absolute;top:2px;right:18%;background:var(--coral);color:#fff;font-size:9px;font-weight:900;
  min-width:16px;height:16px;border-radius:99px;display:grid;place-items:center;padding:0 4px}
.tabwrap{position:relative;flex:1;display:flex}

/* confetti */
.confetti{position:fixed;top:-10px;width:9px;height:14px;z-index:55;pointer-events:none;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.9}}

:focus-visible{outline:3px solid var(--ring);outline-offset:2px;border-radius:8px}
@media (max-width:360px){.node{width:84px}.node .disc{width:66px;height:66px;font-size:26px}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important;animation-iteration-count:1!important}.blob{display:none}}
/* ---- Glossaire ---- */
.gloss-tools{display:flex;gap:8px;margin:2px 0 12px;flex-wrap:wrap}
.gloss-search{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--line);color:var(--ink);
  border-radius:14px;padding:12px 14px;font-size:15px;font-family:var(--font-b);outline:none}
.gloss-search::placeholder{color:var(--ink-mute)}
.gloss-search:focus{border-color:var(--mint)}
.gflash{background:var(--surface);border:1px solid var(--line);color:var(--ink-mute);border-radius:14px;
  padding:0 14px;font-weight:800;font-size:13px;font-family:var(--font-d);cursor:pointer;white-space:nowrap;transition:.15s}
.gflash.on{background:linear-gradient(160deg,var(--mint),#2bb583);color:#06231a;border-color:transparent}
.gloss-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.gchip{background:var(--surface);border:1px solid var(--line);color:var(--ink-mute);border-radius:99px;
  padding:7px 13px;font-weight:800;font-size:12.5px;font-family:var(--font-d);cursor:pointer;transition:.15s;display:inline-flex;gap:5px;align-items:center}
.gchip small{opacity:.7;font-weight:700}
.gchip.on{color:#11102a;background:var(--gc);border-color:transparent}
.gchip.on small{opacity:.85}

<script>
"use strict";

/* =========================================================

   +'<circle cx="42" cy="48" r="1.5" fill="#fff"/><circle cx="62" cy="48" r="1.5" fill="#fff"/>'

   +'<rect x="44" y="28" width="12" height="10" rx="3" fill="#FFC93C"/>'
   +'<path d="M46 28 v-4 a4 4 0 0 1 8 0 v4" fill="none" stroke="#FFC93C" stroke-width="2.5"/>'
   +'</svg>';
}

/* ====================================================================
   BANQUE DE QUESTIONS — ST2GID (couverture exhaustive des 4 modules)
   Format: {id,type:'qcm'|'vf',q,(opts),(code),correct,why}
   VF: correct=0 -> Vrai, correct=1 -> Faux
   ==================================================================== */
const MODULES = [

/* ============================ MODULE 1 ============================ */
{ id:'m1', name:'Notions fondamentales IAM', sub:'Identités, accès, gouvernance', col:'var(--z1)', levels:[

  { id:'m1l1', name:'Identité & cycle de vie', icon:'🧬', q:[
    {id:'m1l1q1',type:'qcm',q:"De quoi se compose une identité numérique ?",opts:["Identifiants + Attributs + Credentials","Login + mot de passe uniquement","Certificat + clé privée","Rôles + Permissions"],correct:0,why:"Identité numérique = identifiants (qui), attributs (caractéristiques) et credentials (preuves d'identité)."},
    {id:'m1l1q2',type:'qcm',q:"Dans une identité numérique, les « credentials » désignent…",opts:["Les preuves d'identité (mot de passe, certificat, biométrie)","Le nom et le service","Les permissions accordées","L'adresse e-mail"],correct:0,why:"Les credentials sont les moyens de PROUVER l'identité ; les attributs en sont les caractéristiques."},
    {id:'m1l1q3',type:'qcm',q:"Quelles sont les phases du cycle de vie d'une identité ?",opts:["Joiner → Mover → Leaver (+ Suspension)","Création → Modification → Suppression","Inscription → Validation → Archivage","Onboarding → Audit → Offboarding"],correct:0,why:"Le cycle JML : Joiner (arrivée), Mover (mobilité), Leaver (départ), avec la Suspension en cas de congé/enquête."},
    {id:'m1l1q4',type:'qcm',q:"L'étape déclenchée par un changement de poste s'appelle…",opts:["Mover","Joiner","Leaver","Suspension"],correct:0,why:"Joiner = arrivée, Mover = mobilité interne, Leaver = départ, Suspension = congé/enquête."},
    {id:'m1l1q5',type:'vf',q:"Lors d'un Mover, on attribue d'abord les nouveaux droits, puis on révoque les anciens.",correct:1,why:"Faux : on révoque AVANT d'attribuer, sinon les droits s'accumulent (sur-privilège / 'privilege creep')."},
    {id:'m1l1q6',type:'qcm',q:"À la fin d'un contrat (Leaver), que fait-on des accès ?",opts:["On révoque TOUS les accès, puis désactivation et archivage","On les garde actifs 6 mois","On supprime le compte sans archivage","On les transfère au manager"],correct:0,why:"Leaver = révocation de tous les accès + désactivation + archivage (conservation pour audit)."},
    {id:'m1l1q7',type:'qcm',q:"La phase « Suspension » est déclenchée par…",opts:["Un congé ou une enquête (désactivation, conservation pour audit)","La signature du contrat","Un changement de service","La fin définitive du contrat"],correct:0,why:"Suspension = désactivation temporaire (congé/enquête) ; le compte est conservé pour audit, pas supprimé."},
    {id:'m1l1q8',type:'qcm',q:"À la phase Joiner, quel principe applique-t-on dès la création du compte ?",opts:["Le moindre privilège (droits initiaux minimaux)","Les droits maximaux par défaut","La copie des droits d'un collègue","Aucun droit jusqu'à la première connexion"],correct:0,why:"Dès le Joiner, on applique le moindre privilège : seulement les droits initiaux strictement nécessaires."},
  ]},

  { id:'m1l2', name:'Modèles de contrôle d\'accès', icon:'🚪', q:[
    {id:'m1l2q1',type:'qcm',q:"Dans le modèle DAC, qui décide des permissions ?",opts:["Le propriétaire de la ressource","L'administrateur central via des labels","Un moteur de règles sur attributs","Le rôle attribué à l'utilisateur"],correct:0,why:"DAC (Discretionary Access Control) : le propriétaire de la ressource décide. Exemple : permissions NTFS."},
    {id:'m1l2q2',type:'qcm',q:"Le modèle MAC repose sur…",opts:["Des labels de classification imposés (ex : SELinux, militaire)","Le choix du propriétaire","Des rôles prédéfinis","Les relations entre entités"],correct:0,why:"MAC (Mandatory Access Control) : labels de classification imposés par le système. Exemples : SELinux, contexte militaire."},
    {id:'m1l2q3',type:'qcm',q:"RBAC attribue les permissions via…",opts:["des rôles (Utilisateurs → Rôles → Permissions)","des attributs dynamiques","le propriétaire de la ressource","des labels de classification"],correct:0,why:"RBAC = Role-Based : on relie les utilisateurs à des rôles qui portent les permissions. Exemple : groupes AD."},
    {id:'m1l2q4',type:'qcm',q:"Quel modèle décide selon des règles sur attributs (sujet, ressource, action, contexte) ?",opts:["ABAC","RBAC","DAC","MAC"],correct:0,why:"ABAC = Attribute-Based : décision selon des attributs et le contexte (ex : si dept=Finance ET heure ouvrée)."},
    {id:'m1l2q5',type:'qcm',q:"Le partage Google Drive (owner / editor / viewer) illustre quel modèle ?",opts:["ReBAC (Relationship-Based)","RBAC","MAC","DAC"],correct:0,why:"ReBAC = Relationship-Based : l'accès dépend de la relation entre l'utilisateur et la ressource (propriétaire/éditeur)."},
    {id:'m1l2q6',type:'qcm',q:"Les permissions NTFS où le propriétaire d'un fichier accorde l'accès relèvent de…",opts:["DAC","MAC","ABAC","ReBAC"],correct:0,why:"DAC : c'est le propriétaire (discrétionnaire) qui décide, comme avec les permissions de fichiers NTFS."},
    {id:'m1l2q7',type:'vf',q:"SELinux et les classifications militaires sont des exemples de contrôle d'accès MAC.",correct:0,why:"Vrai : MAC impose des labels de classification non modifiables par l'utilisateur (SELinux, militaire)."},
    {id:'m1l2q8',type:'qcm',q:"Quel modèle est le plus adapté à une décision contextuelle « si service=Finance ET heure ouvrée » ?",opts:["ABAC","RBAC","DAC","MAC"],correct:0,why:"ABAC évalue des attributs et le contexte en temps réel — idéal pour des règles conditionnelles fines."},
  ]},

  { id:'m1l3', name:'RBAC, ABAC & moindre privilège', icon:'⚖️', q:[
    {id:'m1l3q1',type:'qcm',q:"Quelle est la chaîne logique de RBAC ?",opts:["Utilisateurs → Rôles → Permissions","Utilisateurs → Permissions directes","Attributs → Règles → Décision","Propriétaire → Ressource → Accès"],correct:0,why:"RBAC relie les utilisateurs à des rôles, et les rôles portent les permissions."},
    {id:'m1l3q2',type:'qcm',q:"Un avantage majeur de RBAC est…",opts:["Simple à comprendre, facile à auditer, standardisé (ANSI)","Une granularité contextuelle maximale","L'absence de gestion des rôles","Une adaptation native aux cas dynamiques"],correct:0,why:"RBAC est simple, auditable, aligné sur l'organisation et standardisé (ANSI)."},
    {id:'m1l3q3',type:'qcm',q:"Le principal inconvénient de RBAC est…",opts:["L'explosion du nombre de rôles","Des décisions trop lentes","L'impossibilité d'auditer","Le manque de standard"],correct:0,why:"RBAC souffre de l'explosion des rôles et d'une rigidité (pas de contexte), difficile à grande échelle."},
    {id:'m1l3q4',type:'qcm',q:"Comparé à RBAC, ABAC offre…",opts:["Une flexibilité élevée mais une complexité accrue","Une flexibilité faible et une grande simplicité","Des performances toujours supérieures","Aucune prise en compte du contexte"],correct:0,why:"ABAC = flexibilité et granularité élevées, au prix d'une complexité (règles) et de performances variables (temps réel)."},
    {id:'m1l3q5',type:'qcm',q:"Côté performance, comment se comparent RBAC et ABAC ?",opts:["RBAC est élevé (pré-calculé), ABAC variable (évalué en temps réel)","ABAC est toujours plus rapide","Les deux sont identiques","RBAC est plus lent car contextuel"],correct:0,why:"RBAC pré-calcule les droits (rapide) ; ABAC évalue des règles à la volée (performance variable)."},
    {id:'m1l3q6',type:'qcm',q:"Le principe du moindre privilège consiste à accorder…",opts:["Les droits minimaux, pour la durée minimale, idéalement en JIT","Tous les droits potentiellement utiles","Les droits d'un collègue du même service","Des droits permanents pour éviter les demandes"],correct:0,why:"Moindre privilège = droits strictement nécessaires, durée minimale, attribution juste-à-temps (JIT)."},
    {id:'m1l3q7',type:'qcm',q:"Dans le contexte des accès, « JIT » signifie…",opts:["Just-In-Time (droits accordés juste à temps, temporaires)","Java Identity Token","Joiner Information Tracking","Just Internal Transfer"],correct:0,why:"JIT = Just-In-Time : on accorde un droit au moment du besoin, pour une durée limitée, puis on le retire."},
    {id:'m1l3q8',type:'qcm',q:"Quel modèle hybride est recommandé en pratique ?",opts:["RBAC pour les permissions de base + ABAC pour les contraintes contextuelles","DAC + MAC","Uniquement ABAC","Uniquement RBAC"],correct:0,why:"On combine souvent RBAC (socle de permissions) et ABAC (contraintes contextuelles) pour l'équilibre."},
  ]},

  { id:'m1l4', name:'SoD, 4A & Zero Trust', icon:'🛡️', q:[
    {id:'m1l4q1',type:'qcm',q:"Le principe de séparation des responsabilités (SoD) énonce que…",opts:["Aucun individu ne doit avoir le contrôle complet d'une transaction critique","Chaque utilisateur doit avoir un rôle unique","Les droits doivent être permanents","Un seul administrateur gère tout"],correct:0,why:"SoD : diviser les responsabilités pour prévenir fraude et erreurs ; personne ne contrôle seul une transaction sensible."},
    {id:'m1l4q2',type:'qcm',q:"Quelle est la différence entre SoD statique et dynamique ?",opts:["Statique = interdiction permanente de cumul ; Dynamique = interdiction dans une même transaction","Statique = sur le cloud ; Dynamique = sur site","Statique = pour les admins ; Dynamique = pour les utilisateurs","Aucune, ce sont des synonymes"],correct:0,why:"SoD statique interdit en permanence de cumuler des rôles ; SoD dynamique interdit de les exercer dans une même transaction."},
    {id:'m1l4q3',type:'qcm',q:"L'objectif principal de la SoD est…",opts:["Prévenir la fraude et les erreurs","Accélérer les autorisations","Réduire le nombre de comptes","Centraliser les mots de passe"],correct:0,why:"En divisant les responsabilités (ex : créer ≠ approuver ≠ payer), on empêche qu'une seule personne fraude."},
    {id:'m1l4q4',type:'qcm',q:"Quelle est la devise du modèle Zero Trust ?",opts:["« Never trust, always verify »","« Trust but verify »","« Defense in depth »","« Least privilege first »"],correct:0,why:"Zero Trust : ne jamais faire confiance par défaut, toujours vérifier (chaque accès est ré-authentifié/ré-autorisé)."},
    {id:'m1l4q5',type:'vf',q:"Le modèle Zero Trust repose sur 5 piliers.",correct:0,why:"Vrai : Zero Trust s'articule autour de 5 piliers (identité, appareils, réseau, applications, données)."},
    {id:'m1l4q6',type:'qcm',q:"Quel est l'ordre correct des 4 piliers de l'IAM (4A) ?",opts:["Identification → Authentification → Autorisation → Audit","Authentification → Identification → Audit → Autorisation","Autorisation → Authentification → Audit → Identification","Audit → Identification → Authentification → Autorisation"],correct:0,why:"4A : Identification (qui ?) → Authentification (prouvez-le) → Autorisation (avez-vous le droit ?) → Audit (qu'avez-vous fait ?)."},
    {id:'m1l4q7',type:'qcm',q:"Dans les 4A, l'étape « Audit » correspond à…",opts:["La traçabilité (logs, SIEM)","La vérification du mot de passe","L'attribution des rôles","La déclaration d'identité"],correct:0,why:"Audit = traçabilité des actions (logs, SIEM) : 'qu'avez-vous fait ?'."},
    {id:'m1l4q8',type:'qcm',q:"Le concept de « Defense in Depth » consiste à…",opts:["Empiler plusieurs couches de sécurité indépendantes","Concentrer la sécurité sur un seul pare-feu","Faire confiance au réseau interne","Supprimer les contrôles redondants"],correct:0,why:"Defense in Depth = multiplier les couches de défense pour qu'une faille unique ne compromette pas tout."},
  ]},

  { id:'m1l5', name:'Gouvernance (IGA) & conformité', icon:'📋', q:[
    {id:'m1l5q1',type:'qcm',q:"Que désigne l'IGA (Identity Governance and Administration) ?",opts:["Les processus/technologies pour gérer les identités de façon conforme et auditable","Un protocole d'authentification","Un type de certificat","Un algorithme de chiffrement"],correct:0,why:"IGA = gouvernance et administration des identités : provisioning, gestion des accès, revues, audit/conformité."},
    {id:'m1l5q2',type:'qcm',q:"La « revue des accès » (recertification) en IGA consiste à…",opts:["Re-valider périodiquement que chacun a bien les droits nécessaires","Réinitialiser tous les mots de passe","Supprimer les comptes inactifs uniquement","Chiffrer l'annuaire"],correct:0,why:"La recertification périodique (campagnes, attestation) vérifie que les droits restent justifiés et révoque les excès."},
    {id:'m1l5q3',type:'qcm',q:"Le RGPD impose notamment…",opts:["Droit d'accès, droit à l'oubli, minimisation des données","Le MFA obligatoire sur les infrastructures critiques","La séparation des tâches pour les entreprises cotées","La protection des données de cartes bancaires"],correct:0,why:"RGPD (données personnelles, UE) : droit d'accès, droit à l'oubli, minimisation des données."},
    {id:'m1l5q4',type:'qcm',q:"Quelle réglementation impose le MFA et l'audit des accès pour les infrastructures critiques (UE) ?",opts:["NIS2","RGPD","SOX","PCI-DSS"],correct:0,why:"NIS2 cible les infrastructures critiques de l'UE et impose notamment MFA et audit des accès."},
    {id:'m1l5q5',type:'qcm',q:"Dans la norme ISO 27001, le contrôle d'accès et la revue des droits relèvent de…",opts:["La section A.9","La section A.5","La section A.18","La section A.12"],correct:0,why:"ISO 27001 traite le contrôle d'accès et la revue des droits dans l'annexe A.9."},
    {id:'m1l5q6',type:'qcm',q:"La loi SOX (entreprises cotées, US) met l'accent sur…",opts:["La séparation des tâches (SoD) et l'audit des accès","La minimisation des données personnelles","La sécurité des cartes bancaires","Le MFA des infrastructures critiques"],correct:0,why:"SOX cible les entreprises cotées américaines : SoD et audit des accès pour la fiabilité financière."},
    {id:'m1l5q7',type:'qcm',q:"PCI-DSS concerne principalement…",opts:["Les données de cartes bancaires (moindre privilège, authentification forte)","Les données de santé","Les infrastructures critiques de l'UE","Les marchés publics"],correct:0,why:"PCI-DSS encadre les données de cartes bancaires : moindre privilège et authentification forte."},
    {id:'m1l5q8',type:'qcm',q:"L'IAM 4.0 (2020+) se caractérise par…",opts:["Zero Trust, IA, identités décentralisées (DID), authentification continue","Les annuaires locaux et l'authentification simple","La centralisation par LDAP et SAML uniquement","Le cloud et les identités hybrides sans Zero Trust"],correct:0,why:"IAM 4.0 : Zero Trust, IA, décentralisation (DID), continuous auth. (1.0 = annuaires locaux ; 2.0 = SSO/fédération ; 3.0 = cloud/hybride.)"},
    {id:'m1l5q9',type:'qcm',q:"Dans un workflow de provisioning IGA, le flux typique est…",opts:["Système RH → Moteur IGA → Workflows → Systèmes cibles","Systèmes cibles → IGA → RH","Annuaire → Utilisateur → RH","SIEM → IGA → RH"],correct:0,why:"Le système RH déclenche le moteur IGA, qui exécute des workflows vers les systèmes cibles (provisioning automatique)."},
  ]},

]},

/* ============================ MODULE 2 ============================ */
{ id:'m2', name:'Implémentation technique', sub:'AuthN, Kerberos, fédération, cloud', col:'var(--z2)', levels:[

  { id:'m2l1', name:'AuthN / AuthZ, facteurs & MFA', icon:'🪪', q:[
    {id:'m2l1q1',type:'qcm',q:"Quelle est la différence entre authentification (AuthN) et autorisation (AuthZ) ?",opts:["AuthN prouve QUI vous êtes ; AuthZ décide ce que vous AVEZ LE DROIT de faire","AuthN décide les droits ; AuthZ prouve l'identité","Ce sont deux noms du même processus","AuthN concerne le réseau, AuthZ le stockage"],correct:0,why:"AuthN = vérifier l'identité ; AuthZ = vérifier les droits une fois l'identité prouvée."},
    {id:'m2l1q2',type:'qcm',q:"Les trois grandes catégories de facteurs d'authentification sont…",opts:["Connaissance (savoir), possession (avoir), inhérence (être)","Mot de passe, code PIN, question secrète","Login, badge, e-mail","Local, distant, cloud"],correct:0,why:"Facteurs : ce que l'on SAIT (mot de passe), ce que l'on A (token, téléphone), ce que l'on EST (biométrie)."},
    {id:'m2l1q3',type:'qcm',q:"Le MFA (authentification multifacteur) consiste à…",opts:["Combiner au moins 2 facteurs de catégories différentes","Demander deux mots de passe","Utiliser un mot de passe très long","Se connecter depuis deux appareils"],correct:0,why:"Le MFA combine ≥2 facteurs de catégories DIFFÉRENTES (ex : mot de passe + téléphone). Deux mots de passe = un seul facteur."},
    {id:'m2l1q4',type:'qcm',q:"Dans la hiérarchie de robustesse du MFA, quelle méthode est la PLUS forte ?",opts:["FIDO2 / clé de sécurité matérielle","Authenticator avec number matching","TOTP (code à 6 chiffres)","SMS"],correct:0,why:"FIDO2 (clé matérielle) est le sommet : résistant au phishing. Puis Authenticator+number matching > TOTP > Push > SMS > questions."},
    {id:'m2l1q5',type:'qcm',q:"Parmi ces méthodes MFA, laquelle est la plus FAIBLE ?",opts:["Le code par SMS","FIDO2","TOTP","Authenticator avec number matching"],correct:0,why:"Le SMS est le plus faible (SIM swapping, interception). FIDO2 est le plus fort."},
    {id:'m2l1q6',type:'qcm',q:"Pourquoi FIDO2 résiste-t-il au phishing ?",opts:["L'authentification est liée cryptographiquement au domaine légitime (origin binding)","Le code change toutes les 30 secondes","Il envoie une notification push","Il utilise un mot de passe plus long"],correct:0,why:"FIDO2 lie la preuve au domaine d'origine : un site de phishing ne peut pas réutiliser l'authentification."},
    {id:'m2l1q7',type:'qcm',q:"L'intérêt du « number matching » par rapport à une simple notification push est…",opts:["Empêcher la validation accidentelle/par fatigue (MFA fatigue)","Accélérer la connexion","Supprimer le besoin de mot de passe","Fonctionner hors-ligne"],correct:0,why:"Le number matching oblige à recopier un chiffre affiché, contrant les attaques par 'MFA fatigue' (spam de push)."},
    {id:'m2l1q8',type:'qcm',q:"Un code TOTP (Google Authenticator, etc.) appartient à quelle catégorie de facteur ?",opts:["Possession (ce que l'on a)","Connaissance (ce que l'on sait)","Inhérence (ce que l'on est)","Localisation"],correct:0,why:"Le TOTP est généré par un appareil que l'on possède : c'est un facteur de possession."},
  ]},

  { id:'m2l2', name:'Kerberos', icon:'🎟️', q:[
    {id:'m2l2q1',type:'qcm',q:"Kerberos est, par défaut, le protocole d'authentification de…",opts:["Active Directory (depuis Windows 2000)","LDAP","RADIUS","TLS"],correct:0,why:"Développé au MIT, Kerberos est l'authentification par défaut d'Active Directory depuis Windows 2000."},
    {id:'m2l2q2',type:'qcm',q:"Dans Kerberos, le rôle de tiers de confiance est tenu par…",opts:["Le KDC (Key Distribution Center), porté par le contrôleur de domaine","Le client lui-même","Le serveur de fichiers","Une autorité de certification"],correct:0,why:"Le KDC (sur le contrôleur de domaine) est le tiers de confiance : client et serveur lui font confiance."},
    {id:'m2l2q3',type:'vf',q:"Avec Kerberos, le mot de passe transite chiffré sur le réseau à chaque connexion.",correct:1,why:"Faux : le mot de passe ne transite JAMAIS sur le réseau, même chiffré. Des tickets prouvent l'identité à sa place."},
    {id:'m2l2q4',type:'qcm',q:"Dans l'analogie du parc d'attractions, le TGT correspond à…",opts:["Le bracelet de la journée (obtenu à l'entrée)","Le ticket d'une attraction précise","La carte d'identité montrée à l'entrée","Le plan du parc"],correct:0,why:"TGT (Ticket Granting Ticket) = bracelet journée ; le Service Ticket = ticket d'une attraction précise."},
    {id:'m2l2q5',type:'qcm',q:"Le « Service Ticket » sert à…",opts:["Accéder à un service précis après présentation du TGT","S'authentifier initialement auprès du KDC","Stocker le mot de passe","Chiffrer le disque"],correct:0,why:"Avec son TGT, le client demande au KDC un Service Ticket pour accéder à un service donné."},
    {id:'m2l2q6',type:'qcm',q:"Le système de tickets de Kerberos permet de…",opts:["Prouver l'identité sans jamais révéler le secret","Stocker les mots de passe en clair sur le serveur","Échanger des clés publiques","Remplacer le chiffrement TLS"],correct:0,why:"Des tickets chiffrés prouvent l'identité sans transmettre le mot de passe."},
    {id:'m2l2q7',type:'qcm',q:"Comparé à NTLM, Kerberos apporte notamment…",opts:["Une authentification mutuelle et des tickets à durée limitée","Le fonctionnement sans contrôleur de domaine","Un hash réutilisable","L'absence de tiers de confiance"],correct:0,why:"Kerberos : authentification mutuelle, tickets limités dans le temps, résistance au relais, délégation contrôlable."},
    {id:'m2l2q8',type:'vf',q:"Kerberos offre une authentification mutuelle (le serveur prouve aussi son identité au client).",correct:0,why:"Vrai : contrairement à NTLM, Kerberos authentifie les deux parties (mutuelle)."},
  ]},

  { id:'m2l3', name:'krbtgt, Golden Ticket & NTLM', icon:'👑', q:[
    {id:'m2l3q1',type:'qcm',q:"Le compte krbtgt est crucial parce que…",opts:["Son hash chiffre TOUS les TGT du domaine","Il sert à se connecter en tant qu'administrateur","Il stocke les mots de passe des utilisateurs","Il gère le DNS du domaine"],correct:0,why:"Le hash de krbtgt chiffre tous les TGT : qui le possède peut forger n'importe quel ticket (= roi du domaine)."},
    {id:'m2l3q2',type:'vf',q:"Le compte krbtgt est un compte désactivé, sans login interactif.",correct:0,why:"Vrai : krbtgt est créé automatiquement avec le domaine et reste désactivé (pas de connexion)."},
    {id:'m2l3q3',type:'qcm',q:"Qu'est-ce qu'un Golden Ticket ?",opts:["Un TGT forgé avec le hash krbtgt, donnant un accès total et persistant","Un certificat racine compromis","Un mot de passe administrateur par défaut","Un ticket de support privilégié"],correct:0,why:"Avec le hash krbtgt, l'attaquant forge des TGT valides pour n'importe quel utilisateur → Domain Admin, persistant."},
    {id:'m2l3q4',type:'qcm',q:"Quelle est la remédiation correcte après compromission du krbtgt ?",opts:["Changer le mot de passe de krbtgt DEUX fois","Le changer une seule fois","Supprimer le compte krbtgt","Redémarrer le contrôleur de domaine"],correct:0,why:"Il faut changer le mot de passe de krbtgt deux fois (à cause de l'historique des clés) pour invalider les Golden Tickets."},
    {id:'m2l3q5',type:'qcm',q:"Pourquoi un Golden Ticket est-il particulièrement dangereux ?",opts:["Durée quasi illimitée, indétectable, résiste aux changements de MDP utilisateurs","Il expire au bout de 10 minutes","Il ne fonctionne que sur un seul poste","Il nécessite le mot de passe en clair de chaque cible"],correct:0,why:"Il peut être valide des années, paraît parfaitement légitime, et survit aux changements de mots de passe des utilisateurs."},
    {id:'m2l3q6',type:'qcm',q:"L'attaque « Pass-the-Hash » est une faiblesse caractéristique de…",opts:["NTLM (le hash est réutilisable)","Kerberos","FIDO2","SAML"],correct:0,why:"NTLM permet de réutiliser le hash directement (Pass-the-Hash) ; Kerberos y résiste mieux grâce aux tickets."},
    {id:'m2l3q7',type:'qcm',q:"Le « NTLM Relay » consiste à…",opts:["Rejouer/transférer une authentification vers un autre serveur","Casser le hash hors-ligne","Forger un TGT","Voler un certificat"],correct:0,why:"NTLM Relay rejoue l'authentification de la victime vers un autre serveur (NTLM ne résiste pas au relais)."},
    {id:'m2l3q8',type:'vf',q:"Contrairement à Kerberos, NTLM peut fonctionner sans contrôleur de domaine (authentification locale).",correct:0,why:"Vrai : NTLM fonctionne en local sans DC, alors que Kerberos nécessite un KDC."},
  ]},

  { id:'m2l4', name:'SSO & fédération', icon:'🔗', q:[
    {id:'m2l4q1',type:'qcm',q:"Le principe du SSO (Single Sign-On) est…",opts:["Une seule authentification donne accès à plusieurs applications","Un mot de passe différent par application","L'absence totale d'authentification","Le chiffrement des disques"],correct:0,why:"SSO : l'utilisateur s'authentifie une fois et accède ensuite à plusieurs services sans se ré-identifier."},
    {id:'m2l4q2',type:'qcm',q:"Quel est le principal RISQUE du SSO, et sa parade ?",opts:["Compromettre le compte = accès à TOUT → MFA obligatoire sur l'IdP","Trop de mots de passe → coffre-fort","Lenteur → cache local","Pas d'audit → désactiver les logs"],correct:0,why:"Avec le SSO, compromettre le compte unique ouvre tout : d'où l'exigence de MFA fort sur l'IdP."},
    {id:'m2l4q3',type:'qcm',q:"Dans une fédération, le rôle de l'Identity Provider (IdP) est de…",opts:["Gérer les identités, authentifier et émettre des assertions","Fournir le service métier sans gérer d'identité","Stocker les fichiers des utilisateurs","Délivrer des certificats X.509"],correct:0,why:"L'IdP (ex : Azure AD, Okta, AD FS) crée les comptes, authentifie et émet des assertions de confiance."},
    {id:'m2l4q4',type:'qcm',q:"Le Service Provider (SP) dans une fédération…",opts:["Fait confiance à l'IdP et n'a PAS de mot de passe de l'utilisateur","Stocke les mots de passe des utilisateurs","Authentifie lui-même les utilisateurs","Émet les assertions"],correct:0,why:"Le SP (ex : Salesforce, Office 365) délègue l'authentification à l'IdP et autorise selon l'assertion reçue."},
    {id:'m2l4q5',type:'qcm',q:"Le protocole SAML 2.0 est typiquement…",opts:["Basé sur XML, orienté entreprise (enterprise)","Basé sur JSON, orienté API","Un protocole de chiffrement de disque","Un annuaire d'identités"],correct:0,why:"SAML 2.0 utilise XML et domine les usages d'entreprise (fédération web classique)."},
    {id:'m2l4q6',type:'qcm',q:"OAuth 2.0 est avant tout un protocole d'…",opts:["Autorisation (délégation d'accès aux API, en JSON)","Authentification forte","Chiffrement symétrique","Provisioning de comptes"],correct:0,why:"OAuth 2.0 gère l'AUTORISATION (accès délégué aux API via tokens), pas l'authentification en soi."},
    {id:'m2l4q7',type:'qcm',q:"Quelle est la relation entre OpenID Connect (OIDC) et OAuth 2.0 ?",opts:["OIDC = OAuth 2.0 + authentification (ajout d'un ID Token JWT)","OIDC remplace totalement OAuth","OAuth = OIDC + chiffrement","Ils n'ont aucun rapport"],correct:0,why:"OIDC ajoute à OAuth 2.0 une couche d'authentification : l'ID Token (JWT) qui décrit l'identité de l'utilisateur."},
    {id:'m2l4q8',type:'vf',q:"OAuth 2.0 seul est un protocole d'authentification de l'utilisateur.",correct:1,why:"Faux : OAuth 2.0 fait de l'autorisation. C'est OIDC (OAuth + ID Token) qui apporte l'authentification."},
    {id:'m2l4q9',type:'qcm',q:"L'ID Token d'OpenID Connect est techniquement…",opts:["Un JWT contenant des claims d'identité (iss, sub, email, exp…)","Un certificat X.509","Un cookie de session opaque","Une clé symétrique"],correct:0,why:"L'ID Token est un JWT signé portant des claims comme iss, sub, email et exp."},
  ]},

  { id:'m2l5', name:'SCIM, Conditional Access, PAM, IDaaS', icon:'☁️', q:[
    {id:'m2l5q1',type:'qcm',q:"À quoi sert le protocole SCIM ?",opts:["Automatiser le provisioning/déprovisioning des comptes entre systèmes","Authentifier les utilisateurs","Chiffrer les communications","Émettre des certificats"],correct:0,why:"SCIM (System for Cross-domain Identity Management) synchronise et provisionne automatiquement les comptes."},
    {id:'m2l5q2',type:'qcm',q:"L'accès conditionnel (Conditional Access) est un pilier du Zero Trust car il…",opts:["Décide de l'accès selon le contexte (appareil, localisation, risque)","Stocke les mots de passe","Remplace le pare-feu","Chiffre les disques"],correct:0,why:"L'accès conditionnel évalue le contexte (conformité de l'appareil, localisation, niveau de risque) à chaque connexion."},
    {id:'m2l5q3',type:'qcm',q:"Le PAM (Privileged Access Management) couvre notamment…",opts:["Coffre-fort de mots de passe, accès JIT, enregistrement de session (recording)","La création des comptes standards","Le chiffrement TLS","L'émission de certificats publics"],correct:0,why:"PAM gère les comptes à privilèges : vault de secrets, élévation juste-à-temps, et enregistrement des sessions."},
    {id:'m2l5q4',type:'qcm',q:"Quel composant du PAM stocke et fait tourner les secrets des comptes à privilèges ?",opts:["Le coffre-fort (vault)","Le SIEM","L'IdP","Le KDC"],correct:0,why:"Le vault PAM centralise, sécurise et fait la rotation des mots de passe/secrets privilégiés."},
    {id:'m2l5q5',type:'qcm',q:"L'IDaaS (Identity as a Service) désigne…",opts:["L'IAM fourni en service cloud (plus d'infrastructure à gérer)","Un annuaire LDAP local","Un pare-feu applicatif","Un protocole de chiffrement"],correct:0,why:"IDaaS = IAM livré en SaaS : haute disponibilité, mises à jour automatiques, MFA intégré, nombreux connecteurs."},
    {id:'m2l5q6',type:'qcm',q:"Lesquels sont des solutions IDaaS majeures ?",opts:["Microsoft Entra ID, Okta, AWS IAM Identity Center, Google Cloud Identity","Wireshark, Nmap, Metasploit","SHA-256, AES, RSA","SELinux, AppArmor"],correct:0,why:"Entra ID, Okta, AWS IAM Identity Center et Google Cloud Identity sont des fournisseurs IDaaS de référence."},
    {id:'m2l5q7',type:'qcm',q:"L'enregistrement de session (session recording) du PAM sert surtout à…",opts:["Tracer et auditer ce que font les comptes à privilèges","Accélérer les connexions","Chiffrer les e-mails","Synchroniser les comptes"],correct:0,why:"Le recording capture les sessions privilégiées pour l'audit, l'investigation et la dissuasion."},
    {id:'m2l5q8',type:'qcm',q:"Quelle distinction est correcte ?",opts:["SCIM = provisionner les comptes ; SAML/OIDC = authentifier","SCIM = authentifier ; SAML = provisionner","SCIM et SAML font tous deux du chiffrement","SCIM délivre des certificats"],correct:0,why:"SCIM gère le cycle de vie des comptes (provisioning) ; SAML/OIDC gèrent l'authentification fédérée."},
  ]},

]},

/* ============================ MODULE 3 ============================ */
{ id:'m3', name:'Risques & attaques', sub:'Menaces identité, AD, défenses', col:'var(--z3)', levels:[

  { id:'m3l1', name:'Vol d\'identifiants', icon:'🎣', q:[
    {id:'m3l1q1',type:'qcm',q:"Quel est le vecteur d'attaque n°1 sur l'identité ?",opts:["Le phishing","Le credential stuffing","Le Kerberoasting","Le DCSync"],correct:0,why:"Le phishing reste le vecteur d'entrée n°1 pour voler des identifiants."},
    {id:'m3l1q2',type:'qcm',q:"Le « credential stuffing » consiste à…",opts:["Rejouer des couples identifiant/mot de passe volés ailleurs (réutilisation)","Tester un mot de passe commun sur de nombreux comptes","Forger un ticket Kerberos","Injecter du LDAP"],correct:0,why:"Credential stuffing : on rejoue en masse des identifiants déjà fuités, en pariant sur la réutilisation des mots de passe."},
    {id:'m3l1q3',type:'qcm',q:"Le « password spraying » consiste à…",opts:["Tester quelques mots de passe communs sur BEAUCOUP de comptes","Rejouer des mots de passe volés sur un même compte","Casser un hash hors-ligne","Voler un cookie de session"],correct:0,why:"Password spraying : peu de mots de passe courants essayés largement, pour éviter le verrouillage de comptes."},
    {id:'m3l1q4',type:'qcm',q:"Quelle est la différence entre credential stuffing et password spraying ?",opts:["Stuffing = identifiants déjà volés ; spraying = mots de passe communs sur de nombreux comptes","Aucune, ce sont des synonymes","Stuffing vise Kerberos ; spraying vise LDAP","Stuffing est hors-ligne ; spraying est sur certificat"],correct:0,why:"Stuffing rejoue des couples déjà fuités ; spraying teste un petit nombre de mots de passe communs en largeur."},
    {id:'m3l1q5',type:'qcm',q:"Un « infostealer » (ex : RedLine) est un malware qui…",opts:["Vole identifiants, cookies et secrets sur la machine de la victime","Chiffre les fichiers contre rançon","Forge des certificats","Redirige le trafic réseau"],correct:0,why:"Les infostealers exfiltrent identifiants, cookies de session et autres secrets stockés sur le poste."},
    {id:'m3l1q6',type:'qcm',q:"Quelle défense est la plus efficace contre le credential stuffing ?",opts:["Le MFA (le mot de passe volé ne suffit plus)","Un mot de passe plus long","Désactiver les logs","Changer le port d'écoute"],correct:0,why:"Avec le MFA, un mot de passe réutilisé/volé ne suffit pas pour se connecter."},
    {id:'m3l1q7',type:'qcm',q:"Le phishing « ciblé » sur une personne précise s'appelle…",opts:["Spear phishing","Smishing","Credential stuffing","Watering hole"],correct:0,why:"Le spear phishing vise une personne ou une organisation précise avec un message personnalisé."},
    {id:'m3l1q8',type:'vf',q:"Un infostealer comme RedLine peut récupérer des cookies de session permettant de contourner le MFA.",correct:0,why:"Vrai : voler un cookie de session valide peut permettre de réutiliser une session déjà authentifiée (contournement du MFA)."},
  ]},

  { id:'m3l2', name:'Pass-the-Hash & NTLM', icon:'🔓', q:[
    {id:'m3l2q1',type:'qcm',q:"L'attaque Pass-the-Hash (PtH) permet de…",opts:["S'authentifier sans connaître le mot de passe en clair","Casser un certificat","Déchiffrer du TLS","Forger un certificat racine"],correct:0,why:"PtH réutilise directement le hash NTLM pour s'authentifier, sans jamais connaître le mot de passe en clair."},
    {id:'m3l2q2',type:'qcm',q:"Avec quel outil et depuis quel composant les hashes NTLM sont-ils typiquement extraits ?",opts:["Mimikatz, depuis la mémoire du processus LSASS","Wireshark, depuis le trafic réseau","OpenSSL, depuis le disque","Nmap, depuis les ports ouverts"],correct:0,why:"Mimikatz extrait les hashes NTLM stockés en mémoire dans le processus LSASS."},
    {id:'m3l2q3',type:'qcm',q:"Dans Pass-the-Hash, que fait l'attaquant du hash récupéré ?",opts:["Il le « passe » directement à un autre serveur, sans le casser","Il le casse obligatoirement hors-ligne d'abord","Il le publie sur Internet","Il le convertit en certificat"],correct:0,why:"Le hash est rejoué tel quel pour s'authentifier : pas besoin de retrouver le mot de passe en clair."},
    {id:'m3l2q4',type:'qcm',q:"Quelles défenses contrent efficacement Pass-the-Hash ?",opts:["Credential Guard, Protected Users, LAPS, Tiering, désactivation de NTLM","Un antivirus signature uniquement","Changer le DNS","Augmenter la RAM"],correct:0,why:"Credential Guard, Protected Users, LAPS et le Tiering, plus l'abandon de NTLM, réduisent fortement le risque de PtH."},
    {id:'m3l2q5',type:'qcm',q:"À quoi sert LAPS (Local Administrator Password Solution) ?",opts:["Donner un mot de passe administrateur local UNIQUE et tournant par machine","Centraliser les certificats","Chiffrer les e-mails","Gérer les tickets Kerberos"],correct:0,why:"LAPS attribue à chaque machine un mot de passe admin local unique et renouvelé, empêchant la réutilisation latérale."},
    {id:'m3l2q6',type:'qcm',q:"Credential Guard (Windows 10/11) protège en…",opts:["Isolant les secrets d'authentification de la mémoire accessible (virtualisation)","Chiffrant le disque dur","Bloquant les ports USB","Filtrant les e-mails"],correct:0,why:"Credential Guard isole les secrets via la sécurité basée sur la virtualisation, les soustrayant à Mimikatz."},
    {id:'m3l2q7',type:'vf',q:"Désactiver NTLM (quand c'est possible) réduit la surface d'attaque Pass-the-Hash / NTLM Relay.",correct:0,why:"Vrai : NTLM est la racine de PtH et du relais ; le désactiver supprime ces vecteurs."},
    {id:'m3l2q8',type:'qcm',q:"Quelle commande Mimikatz illustre l'extraction des secrets ?",code:"mimikatz # sekurlsa::logonpasswords",opts:["sekurlsa::logonpasswords","openssl x509 -in cert.pem","nmap -sV 10.0.0.1","kinit user@DOMAIN"],correct:0,why:"sekurlsa::logonpasswords liste les identifiants/hashes présents en mémoire (LSASS)."},
  ]},

  { id:'m3l3', name:'Kerberoasting, Silver/Golden & DCSync', icon:'🔥', q:[
    {id:'m3l3q1',type:'qcm',q:"Le Kerberoasting cible…",opts:["Les comptes de service possédant un SPN","Le compte krbtgt directement","Les certificats X.509","Les cookies de session"],correct:0,why:"Tout utilisateur authentifié peut demander un Service Ticket pour un SPN ; le ticket, chiffré avec le hash du compte de service, est cassable hors-ligne."},
    {id:'m3l3q2',type:'qcm',q:"Pourquoi le Service Ticket obtenu en Kerberoasting est-il exploitable ?",opts:["Il est chiffré avec le hash du mot de passe du compte de service → crackable hors-ligne","Il contient le mot de passe en clair","Il est signé par la CA racine","Il donne directement les droits Domain Admin"],correct:0,why:"Le ticket est chiffré avec le hash du compte de service : l'attaquant le casse hors-ligne (hashcat/john) si le mot de passe est faible."},
    {id:'m3l3q3',type:'qcm',q:"Quelle est la meilleure défense contre le Kerberoasting ?",opts:["Mots de passe ≥ 25 caractères pour les comptes de service, ou gMSA","Désactiver Kerberos","Bloquer le port 88 en interne","Changer le SID du domaine"],correct:0,why:"Des mots de passe longs (≥25) ou des comptes gérés (gMSA, mots de passe gérés automatiquement) rendent le crack hors-ligne impraticable."},
    {id:'m3l3q4',type:'qcm',q:"L'AS-REP Roasting exploite des comptes…",opts:["Sans pré-authentification Kerberos requise","Avec un SPN défini","Membres des Domain Admins","Désactivés"],correct:0,why:"Si la pré-authentification n'est pas exigée, l'attaquant obtient un AS-REP chiffré avec le hash du compte, cassable hors-ligne."},
    {id:'m3l3q5',type:'qcm',q:"Qu'est-ce qu'un Silver Ticket ?",opts:["Un Service Ticket forgé avec le hash NTLM d'un compte de service (accès au service ciblé)","Un TGT forgé avec le hash krbtgt","Un certificat racine volé","Un cookie de session rejoué"],correct:0,why:"Le Silver Ticket forge un TGS pour un service précis avec le hash du compte de service — sans contact avec le KDC."},
    {id:'m3l3q6',type:'qcm',q:"En quoi le Silver Ticket diffère-t-il du Golden Ticket ?",opts:["Il utilise le hash du compte de service (pas krbtgt), est limité au service, et plus furtif","Il dure plus longtemps","Il donne un accès plus large","Il nécessite le KDC"],correct:0,why:"Silver = hash du compte de service, portée limitée au service, pas de contact KDC → plus furtif (pas de log côté DC)."},
    {id:'m3l3q7',type:'qcm',q:"L'attaque DCSync consiste à…",opts:["Se faire passer pour un DC et demander la réplication des secrets (hashes)","Synchroniser l'heure des DC","Sauvegarder Active Directory","Mettre à jour les certificats"],correct:0,why:"DCSync imite un contrôleur de domaine et demande la réplication des secrets, récupérant les hashes — dont celui de krbtgt."},
    {id:'m3l3q8',type:'qcm',q:"Quels privilèges sont nécessaires pour un DCSync ?",opts:["Replicating Directory Changes (+ All)","Domain Users standard","Lecture LDAP anonyme","Accès physique au serveur"],correct:0,why:"DCSync requiert les droits de réplication (Replicating Directory Changes / Changes All), souvent via un compte délégué."},
    {id:'m3l3q9',type:'qcm',q:"Quels outils servent à casser les tickets/hashes hors-ligne ?",opts:["hashcat ou John the Ripper","Wireshark ou tcpdump","OpenSSL ou GPG","Nmap ou Masscan"],correct:0,why:"hashcat et John the Ripper cassent hors-ligne les hashes/tickets récupérés (Kerberoasting, AS-REP…)."},
  ]},

  { id:'m3l4', name:'Attaques protocoles & Kill Chain', icon:'⛓️', q:[
    {id:'m3l4q1',type:'qcm',q:"La LDAP injection consiste à…",opts:["Injecter des filtres LDAP malveillants dans une requête","Forger un ticket Kerberos","Voler un cookie OAuth","Casser un hash hors-ligne"],correct:0,why:"On insère des caractères de filtre LDAP pour contourner l'authentification ou faire fuiter des informations de l'annuaire."},
    {id:'m3l4q2',type:'qcm',q:"Le SAML Signature Wrapping vise à…",opts:["Manipuler l'XML pour faire valider une signature sur des données différentes","Casser la clé privée de la CA","Rejouer un mot de passe","Saturer le serveur"],correct:0,why:"On insère des éléments <Assertion> non signés tout en gardant une signature valide ailleurs → usurpation dans la fédération SAML."},
    {id:'m3l4q3',type:'qcm',q:"L'OAuth Token Hijacking exploite souvent…",opts:["Un open redirect, du XSS ou un vol de cookie (redirect_uri)","Une faille du protocole Kerberos","Un certificat expiré","Un mot de passe par défaut"],correct:0,why:"Le détournement de token OAuth passe par open redirect, XSS ou vol de cookie, donnant accès aux API au nom de la victime."},
    {id:'m3l4q4',type:'qcm',q:"Combien d'étapes compte la Cyber Kill Chain (Lockheed Martin) ?",opts:["7","5","14","3"],correct:0,why:"La Cyber Kill Chain comporte 7 étapes, de la Reconnaissance aux Actions sur objectifs."},
    {id:'m3l4q5',type:'qcm',q:"Quelle est la première étape de la Cyber Kill Chain ?",opts:["Reconnaissance","Exploitation","Command & Control","Actions on objectives"],correct:0,why:"L'ordre : Reconnaissance → Weaponization → Delivery → Exploitation → Installation → C2 → Actions."},
    {id:'m3l4q6',type:'qcm',q:"Pourquoi bloquer l'attaque tôt dans la Kill Chain ?",opts:["C'est environ 10× moins coûteux qu'aux dernières étapes","C'est obligatoire légalement","Cela évite tout audit","Les dernières étapes sont inoffensives"],correct:0,why:"Stopper l'attaque en Reconnaissance/Delivery coûte ~10× moins cher que d'intervenir après compromission."},
    {id:'m3l4q7',type:'qcm',q:"Pass-the-Hash, Kerberoasting et DCSync interviennent surtout à quelle étape de la Kill Chain ?",opts:["Actions / Lateral Movement (mouvement latéral)","Reconnaissance","Weaponization","Delivery"],correct:0,why:"Ces techniques servent au mouvement latéral et aux actions finales, une fois un premier pied gagné."},
    {id:'m3l4q8',type:'qcm',q:"Dans la Kill Chain, « C2 » désigne…",opts:["Command & Control (canal de pilotage de l'attaquant)","Cyber Counter-attack","Credential Capture","Certificate Chain"],correct:0,why:"C2 = Command & Control : le canal (HTTPS, DNS…) par lequel l'attaquant pilote les machines compromises."},
    {id:'m3l4q9',type:'qcm',q:"L'étape « Weaponization » consiste à…",opts:["Préparer l'arme/charge (ex : construire le mail de phishing ciblé)","Exfiltrer les données","Installer la persistance","Scanner le réseau"],correct:0,why:"Weaponization = fabriquer l'outil offensif (charge malveillante, mail piégé) avant de le livrer (Delivery)."},

  { id:'m3l5', name:'MITRE, IoC & défenses', icon:'🛰️', q:[
    {id:'m3l5q1',type:'qcm',q:"MITRE ATT&CK est organisé autour de…",opts:["14 tactiques (taxonomie opérationnelle des techniques)","7 étapes linéaires","5 piliers","3 niveaux de criticité"],correct:0,why:"ATT&CK décrit 14 tactiques (objectifs adverses) et les techniques associées : une taxonomie opérationnelle."},
    {id:'m3l5q2',type:'qcm',q:"En quoi MITRE ATT&CK diffère-t-il de la Cyber Kill Chain ?",opts:["ATT&CK est une matrice de techniques (non strictement linéaire) ; la Kill Chain est une séquence d'étapes","ATT&CK a 7 étapes ; la Kill Chain en a 14","Ils sont identiques","ATT&CK est un outil de chiffrement"],correct:0,why:"La Kill Chain est séquentielle (7 étapes) ; ATT&CK est une matrice détaillée de tactiques/techniques, plus granulaire."},
    {id:'m3l5q3',type:'qcm',q:"L'« impossible travel » est un IoC qui détecte…",opts:["Deux connexions depuis des lieux trop éloignés en trop peu de temps","Un mot de passe trop court","Un certificat expiré","Un disque plein"],correct:0,why:"Impossible travel : un même compte se connecte depuis des localisations géographiquement incompatibles → vol probable."},
    {id:'m3l5q4',type:'qcm',q:"Lequel est un Indicateur de Compromission (IoC) lié aux privilèges ?",opts:["L'ajout soudain d'un compte aux Domain Admins","Un pic de trafic web","Une mise à jour Windows","Un redémarrage planifié"],correct:0,why:"Une élévation inattendue (ajout aux Domain Admins, nouveaux comptes admin) est un IoC fort côté privilèges."},
    {id:'m3l5q5',type:'qcm',q:"Des « TGS-REQ massifs » sont un IoC évoquant…",opts:["Du Kerberoasting","Du phishing","Une injection LDAP","Un MITM TLS"],correct:0,why:"Une rafale de demandes de Service Tickets (TGS-REQ) trahit une énumération de SPN typique du Kerberoasting."},
    {id:'m3l5q6',type:'qcm',q:"Quel ensemble de défenses est cité comme socle contre les attaques d'identité AD ?",opts:["Tiering + PAW + Protected Users + LAPS + MFA + Credential Guard","Antivirus + pare-feu uniquement","VPN + proxy uniquement","Sauvegardes + RAID"],correct:0,why:"Le socle : modèle de Tiering, PAW, Protected Users, LAPS, MFA et Credential Guard."},
    {id:'m3l5q7',type:'qcm',q:"Une PAW (Privileged Access Workstation) est…",opts:["Un poste dédié et durci pour les tâches d'administration","Un pare-feu applicatif","Un coffre-fort de certificats","Un serveur de logs"],correct:0,why:"La PAW est un poste isolé et durci réservé à l'administration, pour ne pas exposer les comptes privilégiés."},
    {id:'m3l5q8',type:'qcm',q:"L'UEBA (User and Entity Behavior Analytics) sert à…",opts:["Détecter les comportements anormaux d'utilisateurs/entités","Chiffrer les données","Émettre des certificats","Provisionner des comptes"],correct:0,why:"L'UEBA établit des profils de comportement et alerte sur les écarts (connexions inhabituelles, élévations…)."},
    {id:'m3l5q9',type:'qcm',q:"Le modèle de « Tiering » (Tier 0/1/2) vise à…",opts:["Cloisonner les niveaux d'administration pour limiter le mouvement latéral","Classer les certificats","Trier les e-mails","Hiérarchiser les sauvegardes"],correct:0,why:"Le Tiering sépare les niveaux (Tier 0 = contrôleurs de domaine, etc.) pour qu'une compromission ne se propage pas vers le haut."},
    {id:'m3l5q10',type:'qcm',q:"Le trio « gagnant » de détection cité est…",opts:["IoC + UEBA + SIEM","VPN + proxy + DNS","AES + RSA + SHA","DAC + MAC + RBAC"],correct:0,why:"La synthèse du module retient IoC + UEBA + SIEM comme combinaison de détection efficace."},
  ]},

]},

/* ============================ MODULE 4 ============================ */
{ id:'m4', name:'Crypto & certificats', sub:'Chiffrement, hash, PKI, X.509', col:'var(--z4)', levels:[

  { id:'m4l1', name:'Services & symétrique vs asymétrique', icon:'🎯', q:[
    {id:'m4l1q1',type:'qcm',q:"Quels sont les 4 services de sécurité (CIA + N) ?",opts:["Confidentialité, Intégrité, Authenticité, Non-répudiation","Confidentialité, Intégrité, Accès, Notification","Chiffrement, Identification, Audit, Niveau","Confidentialité, Identité, Autorisation, Niveau"],correct:0,why:"CIA + N : Confidentialité, Intégrité, Authenticité, Non-répudiation."},
    {id:'m4l1q2',type:'qcm',q:"Quel service garantit que « seul le destinataire peut lire » ?",opts:["La confidentialité (chiffrement)","L'intégrité (hachage)","L'authenticité (signature)","La non-répudiation"],correct:0,why:"La confidentialité s'obtient par le chiffrement (AES, RSA…) : seul le destinataire déchiffre."},
    {id:'m4l1q3',type:'qcm',q:"Quel mécanisme assure l'intégrité d'un message ?",opts:["Le hachage (SHA-256)","Le chiffrement symétrique","L'horodatage seul","La compression"],correct:0,why:"L'intégrité (le message n'a pas été modifié) se vérifie via une fonction de hachage comme SHA-256."},
    {id:'m4l1q4',type:'qcm',q:"L'authenticité (l'expéditeur est bien celui qu'il prétend) repose sur…",opts:["La signature numérique","Le simple chiffrement AES","Un mot de passe","La compression"],correct:0,why:"La signature numérique prouve l'authenticité (et contribue à l'intégrité)."},
    {id:'m4l1q5',type:'qcm',q:"La non-répudiation s'obtient typiquement par…",opts:["Signature numérique + horodatage","Chiffrement symétrique seul","Un pare-feu","Un VPN"],correct:0,why:"Signer (avec la clé privée) + horodater empêche l'expéditeur de nier avoir émis le message."},
    {id:'m4l1q6',type:'qcm',q:"En cryptographie symétrique…",opts:["Une seule clé partagée sert à chiffrer ET déchiffrer ; c'est très rapide","Deux clés (publique/privée) sont utilisées","Aucune clé n'est nécessaire","On utilise uniquement un hash"],correct:0,why:"Symétrique = une clé secrète unique, partagée ; rapide (AES-NI) mais distribution de la clé délicate."},
    {id:'m4l1q7',type:'qcm',q:"La cryptographie asymétrique se caractérise par…",opts:["Deux clés liées (publique + privée), mais ~1000× plus lente que le symétrique","Une clé unique partagée","L'absence de clé privée","Une vitesse supérieure au symétrique"],correct:0,why:"Asymétrique = paire publique/privée ; pratique pour la distribution, mais bien plus lente (~1000×)."},
    {id:'m4l1q8',type:'qcm',q:"Quel algorithme est symétrique ?",opts:["AES","RSA","ECDSA","Ed25519"],correct:0,why:"AES (et ChaCha20) sont symétriques ; RSA, ECDSA, Ed25519 sont asymétriques."},
    {id:'m4l1q9',type:'qcm',q:"Le principal défi de la cryptographie symétrique est…",opts:["La distribution de la clé sur un canal sûr","La lenteur du chiffrement","La taille énorme des clés","L'impossibilité de chiffrer de gros volumes"],correct:0,why:"Le point faible du symétrique est la distribution de la clé partagée — ce que résout l'échange asymétrique (Diffie-Hellman)."},
  ]},

  { id:'m4l2', name:'Hachage & signature', icon:'#️⃣', q:[
    {id:'m4l2q1',type:'qcm',q:"Une fonction de hachage cryptographique…",opts:["Transforme une donnée de taille quelconque en une empreinte de taille fixe","Chiffre puis déchiffre avec la même clé","Échange une clé secrète","Signe avec la clé privée"],correct:0,why:"Le hachage produit une empreinte de longueur fixe à partir d'une entrée de taille arbitraire."},
    {id:'m4l2q2',type:'qcm',q:"Quelles sont les 4 propriétés attendues d'une fonction de hachage ?",opts:["Déterminisme, rapidité, résistance à la préimage, résistance aux collisions","Réversibilité, lenteur, unicité, compression","Symétrie, asymétrie, signature, horodatage","Confidentialité, intégrité, authenticité, non-répudiation"],correct:0,why:"Déterministe, rapide à calculer, résistante à la préimage (on ne remonte pas à l'entrée) et aux collisions (deux entrées ≠ même empreinte)."},
    {id:'m4l2q3',type:'qcm',q:"Quels algorithmes de hachage sont aujourd'hui considérés comme CASSÉS ?",opts:["MD5 et SHA-1","SHA-256 et SHA-3","SHA-256 seul","bcrypt et Argon2"],correct:0,why:"MD5 et SHA-1 sont cassés (collisions) et interdits ; on utilise SHA-256 ou supérieur."},
    {id:'m4l2q4',type:'qcm',q:"Quel algorithme de hachage est recommandé aujourd'hui ?",opts:["SHA-256","MD5","SHA-1","CRC32"],correct:0,why:"SHA-256 (famille SHA-2) est sûr et recommandé ; MD5/SHA-1 sont à proscrire."},
    {id:'m4l2q5',type:'vf',q:"Une fonction de hachage cryptographique est réversible : on peut retrouver l'entrée à partir de l'empreinte.",correct:1,why:"Faux : le hachage est à sens unique. La résistance à la préimage empêche de remonter à l'entrée."},
    {id:'m4l2q6',type:'qcm',q:"Pour SIGNER puis VÉRIFIER un message, on utilise…",opts:["La clé privée pour signer, la clé publique pour vérifier","La clé publique pour signer, la clé privée pour vérifier","La même clé symétrique des deux côtés","Un simple hash sans clé"],correct:0,why:"On signe avec sa clé privée (que l'on garde) et tout le monde vérifie avec la clé publique correspondante."},
    {id:'m4l2q7',type:'qcm',q:"La signature numérique apporte surtout…",opts:["Authenticité, intégrité et non-répudiation","La confidentialité du message","Un échange de clé sécurisé","La compression des données"],correct:0,why:"Hash + signature = authenticité + intégrité + non-répudiation (mais PAS la confidentialité, qui vient du chiffrement)."},
    {id:'m4l2q8',type:'qcm',q:"Pour stocker un mot de passe de façon sûre, on utilise…",opts:["Un hachage avec sel (hash + sel)","Un chiffrement réversible AES","Un stockage en clair protégé par pare-feu","Une signature RSA"],correct:0,why:"On stocke un hash salé du mot de passe : irréversible, et le sel empêche les attaques par tables précalculées."},
  ]},

  { id:'m4l3', name:'Diffie-Hellman, PFS & hybride', icon:'🤝', q:[
    {id:'m4l3q1',type:'qcm',q:"L'échange Diffie-Hellman permet à deux parties de…",opts:["Établir un secret commun sur un canal non sûr, sans le transmettre","Signer un document","Chiffrer un gros fichier rapidement","Vérifier un certificat"],correct:0,why:"Diffie-Hellman (1976) permet de dériver un secret partagé sur un canal public sans jamais transmettre ce secret."},
    {id:'m4l3q2',type:'qcm',q:"En quelle année Diffie & Hellman publient-ils leur méthode d'échange de clés ?",opts:["1976","1991","2001","1965"],correct:0,why:"Diffie-Hellman date de 1976 — fondateur de la cryptographie à clé publique."},
    {id:'m4l3q3',type:'qcm',q:"Quelle variante de Diffie-Hellman apporte la Perfect Forward Secrecy ?",opts:["Les versions éphémères (DHE / ECDHE)","Le DH statique classique","RSA en mode chiffrement","AES-GCM"],correct:0,why:"Les versions éphémères (DHE/ECDHE) génèrent des clés à usage unique → PFS : compromettre une clé long terme ne révèle pas les sessions passées."},
    {id:'m4l3q4',type:'qcm',q:"Que signifie « Perfect Forward Secrecy » (PFS) ?",opts:["La compromission d'une clé long terme ne révèle pas les sessions passées","Le chiffrement est incassable","Les clés ne changent jamais","La signature est éternelle"],correct:0,why:"PFS garantit que chaque session a un secret éphémère : voler la clé privée du serveur ne déchiffre pas le trafic antérieur."},
    {id:'m4l3q5',type:'qcm',q:"Dans TLS, la cryptographie hybride combine typiquement…",opts:["ECDHE (échange) + RSA/ECDSA (signature) + AES-GCM (canal)","Uniquement RSA","Uniquement AES","MD5 + SHA-1"],correct:0,why:"TLS hybride : ECDHE pour l'échange de clé, RSA/ECDSA pour la signature/authentification, AES-GCM pour chiffrer le flux."},
    {id:'m4l3q6',type:'qcm',q:"Pourquoi utilise-t-on la cryptographie HYBRIDE en pratique ?",opts:["L'asymétrique gère l'échange/l'auth, le symétrique chiffre le gros volume (rapide)","Pour doubler la longueur des clés","Parce que le symétrique seul est plus sûr","Pour éviter toute signature"],correct:0,why:"On profite des forces de chacun : asymétrique pour échanger/authentifier, symétrique (rapide) pour chiffrer les données."},
    {id:'m4l3q7',type:'qcm',q:"X25519 est…",opts:["Un échange de clés ECDH (Curve25519), standard de TLS 1.3","Un algorithme de hachage","Un format de certificat","Un mode de chiffrement par bloc"],correct:0,why:"X25519 est l'échange ECDH basé sur Curve25519, largement utilisé dans TLS 1.3."},
    {id:'m4l3q8',type:'qcm',q:"ChaCha20 est…",opts:["Un algorithme de chiffrement symétrique (alternative à AES)","Un algorithme asymétrique","Une fonction de hachage","Un protocole d'échange de clés"],correct:0,why:"ChaCha20 est un chiffrement symétrique de flux, alternative performante à AES (notamment sur mobile)."},
  ]},

    {id:'m4l4q2',type:'qcm',q:"Quelles sont les conséquences d'un MITM réussi ?",opts:["Lecture totale des échanges, modification silencieuse, usurpation d'identité","Uniquement un ralentissement réseau","La perte des données locales","Le blocage des e-mails"],correct:0,why:"Un MITM permet la lecture intégrale, la modification à la volée et l'usurpation d'identité."},

    {id:'m4l4q5',type:'qcm',q:"Comment une CA garantit-elle l'authenticité d'un certificat ?",opts:["Elle le SIGNE avec sa propre clé privée","Elle le chiffre avec sa clé publique","Elle le hache uniquement","Elle le stocke hors-ligne"],correct:0,why:"La CA signe le certificat avec sa clé privée ; chacun vérifie cette signature avec la clé publique de la CA."},
    {id:'m4l4q6',type:'qcm',q:"Un certificat numérique lie de façon vérifiable…",opts:["Une identité + une clé publique + des attributs, le tout signé par une CA","Une clé privée + un mot de passe","Deux clés symétriques","Un hash et un sel"],correct:0,why:"Le certificat lie identité, clé publique et attributs (validité, usage…), signés par une CA."},

/* ---------- Index ---------- */
const LEVELS = [];
MODULES.forEach(m=>m.levels.forEach(l=>{ l.modId=m.id; l.modCol=m.col; LEVELS.push(l); }));
const ALL_Q = [];
MODULES.forEach(m=>m.levels.forEach(l=>l.q.forEach(q=>{ q.modId=m.id; ALL_Q.push(q); })));
const NODES = [...LEVELS, BOSS];           // ordre de progression
const levelById = id => LEVELS.find(l=>l.id===id);
const modColVar = id => (MODULES.find(m=>m.id===id)||{}).col || 'var(--z1)';

/* ---------- État + persistance ---------- */
const KEY = 'cyberquete:save:v1';
const STORE = (typeof window!=='undefined' && window.storage) ? window.storage : null;
function defaultState(){ return {
  xp:0, totalAnswered:0, totalCorrect:0, longestStreak:0,
  levels:{}, q:{}, unlockedIndex:0, onboarded:false, muted:false, lastPlayed:Date.now()
};}
let S = defaultState();

async function load(){
  if(!STORE) return;
  try{ const r = await STORE.get(KEY); if(r && r.value) S = Object.assign(defaultState(), JSON.parse(r.value)); }
  catch(e){ /* clé absente ou erreur → défauts */ }
}
let saveTimer=null;
function save(){
  if(!STORE) return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{ try{ S.lastPlayed=Date.now(); await STORE.set(KEY, JSON.stringify(S)); }catch(e){} }, 250);
}

/* ---------- XP / niveaux ---------- */
function xpForLevel(n){ return 60*n + 20*n*(n-1); } // cumul pour atteindre le niveau n
function levelFromXp(xp){ let n=1; while(xp >= xpForLevel(n+1)) n++; return n; }
function levelProgress(xp){
  const n=levelFromXp(xp), lo=xpForLevel(n), hi=xpForLevel(n+1);
  return { n, into:xp-lo, span:hi-lo, lo, hi };
}

/* ---------- Mastery ---------- */
function qStat(id){ return S.q[id] || (S.q[id]={seen:0,correct:0,wrong:0,mastered:false,last:null}); }
function isMastered(id){ const s=S.q[id]; return !!(s && s.mastered); }
function toReviewList(){
  return ALL_Q.filter(q=>{ const s=S.q[q.id]; return s && s.seen>0 && (!s.mastered || s.last===false); });
}
function moduleMastery(modId){
  const qs = ALL_Q.filter(q=>q.modId===modId);
  const m = qs.filter(q=>isMastered(q.id)).length;
  return { mastered:m, total:qs.length, pct: qs.length? Math.round(m/qs.length*100):0 };
}

/* ---------- Audio ---------- */
let actx=null;
function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function tone(freq,dur,type,when,gain){
  if(S.muted||!actx) return;
  const o=actx.createOscillator(), g=actx.createGain(); o.type=type||'sine'; o.frequency.value=freq;
  const t=actx.currentTime+(when||0); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(gain||0.12,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+dur+0.02);
}
function sfxGood(){ tone(660,0.12,'triangle',0,0.13); tone(880,0.16,'triangle',0.09,0.13); }
function sfxBad(){ tone(200,0.18,'sawtooth',0,0.10); tone(150,0.22,'sawtooth',0.1,0.10); }
function sfxStar(i){ tone(700+i*180,0.16,'sine',i*0.12,0.14); }
function sfxLevelUp(){ [523,659,784,1046].forEach((f,i)=>tone(f,0.2,'triangle',i*0.1,0.13)); }

/* ---------- Confetti ---------- */
function confetti(n){
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const cols=['#FFC93C','#3DDC97','#FF7A7A','#46D0C8','#AB8CFB','#56CCF2'];
  for(let i=0;i<n;i++){ const d=document.createElement('div'); d.className='confetti';
    d.style.left=Math.random()*100+'vw'; d.style.background=cols[i%cols.length];
    d.style.animationDuration=(1.6+Math.random()*1.4)+'s'; d.style.animationDelay=(Math.random()*0.3)+'s';
    d.style.transform='rotate('+Math.random()*360+'deg)'; document.body.appendChild(d);
    setTimeout(()=>d.remove(),3400); }
}

const $ = s=>document.querySelector(s);
const view = $('#view');
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function renderTop(){
  const p=levelProgress(S.xp);
  $('#tbLvl').textContent=p.n;
  $('#tbXp').textContent=p.into+' / '+p.span;
  $('#tbXpFill').style.width=Math.max(4,Math.round(p.into/p.span*100))+'%';
